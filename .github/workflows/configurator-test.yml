name: Configurator Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/aks-configurator.html'
      - 'tools/test/**'
      - '.github/workflows/configurator-test.yml'
  push:
    branches: [main]
    paths:
      - 'tools/aks-configurator.html'
      - 'tools/test/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  js-syntax:
    name: JavaScript Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Extract <script> block and run node --check
        run: |
          awk '/^<script>$/,/^<\/script>$/' tools/aks-configurator.html \
            | sed '1d;$d' > /tmp/configurator.js
          node --check /tmp/configurator.js
          echo "JS_OK"

  generate-and-build:
    name: Generate + Bicep Build (${{ matrix.environment }})
    needs: js-syntax
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, acc, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/test/package.json

      - name: Install jsdom
        working-directory: tools/test
        run: npm install --no-audit --no-fund

      - name: Generate package from configurator
        run: |
          node tools/test/generate-package.mjs \
            --env ${{ matrix.environment }} \
            --out generated-${{ matrix.environment }}
          echo "---files---"
          find generated-${{ matrix.environment }} -type f | sort

      - name: Bicep Build
        run: |
          az bicep install
          az bicep build --file generated-${{ matrix.environment }}/main.bicep

      - name: Upload generated package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-${{ matrix.environment }}
          path: generated-${{ matrix.environment }}/
          retention-days: 7

  ps-rule-generated:
    name: PSRule for Azure (generated ${{ matrix.environment }})
    needs: generate-and-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, acc, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Download generated package
        uses: actions/download-artifact@v4
        with:
          name: generated-${{ matrix.environment }}
          path: generated-${{ matrix.environment }}

      - name: PSRule for Azure
        uses: microsoft/ps-rule@v2
        with:
          modules: PSRule.Rules.Azure
          inputPath: generated-${{ matrix.environment }}/
          outputFormat: Markdown
          outputPath: psrule-${{ matrix.environment }}.md

      - name: Upload PSRule results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: psrule-${{ matrix.environment }}
          path: psrule-${{ matrix.environment }}.md
          retention-days: 7

  what-if-generated:
    name: What-If on Generated Package (${{ matrix.environment }})
    needs: generate-and-build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, acc, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Download generated package
        uses: actions/download-artifact@v4
        with:
          name: generated-${{ matrix.environment }}
          path: generated-${{ matrix.environment }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-If
        id: whatif
        run: |
          result=$(az deployment sub what-if \
            --location westeurope \
            --template-file generated-${{ matrix.environment }}/main.bicep \
            --parameters generated-${{ matrix.environment }}/main.${{ matrix.environment }}.bicepparam \
            --no-pretty-print 2>&1) || true
          {
            echo "result<<WHATIF_EOF"
            echo "$result"
            echo "WHATIF_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post What-If as PR Comment
        if: github.event.pull_request != null
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Configurator What-If Results for \`${{ matrix.environment }}\`

            <details>
            <summary>az deployment sub what-if output</summary>

            \`\`\`
            ${{ steps.whatif.outputs.result }}
            \`\`\`

            </details>

            *Test fixture: customerName=citest, real-GUID admin group. Triggered by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
