name: Validate Bicep

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - 'bicepconfig.json'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, acc, prod]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep Build
        run: az bicep build --file infra/main.bicep

      - name: What-If
        id: whatif
        run: |
          result=$(az deployment sub what-if \
            --location westeurope \
            --template-file infra/main.bicep \
            --parameters infra/main.${{ matrix.environment }}.bicepparam \
            --no-pretty-print 2>&1) || true
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$result" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post What-If as PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### What-If Results for \`${{ matrix.environment }}\` 🔍

            \`\`\`
            ${{ steps.whatif.outputs.result }}
            \`\`\`

            *Triggered by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
