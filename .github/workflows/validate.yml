name: Validate Bicep

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - 'bicepconfig.json'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  lint-and-scan:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bicep Build
        run: az bicep build --file infra/main.bicep

      - name: PSRule for Azure
        uses: microsoft/ps-rule@v2
        with:
          modules: PSRule.Rules.Azure
          inputPath: infra/
          outputFormat: Markdown
          outputPath: ps-rule-results.md

      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: bicep
          quiet: true
          soft_fail: true
          output_format: github_failed_only

      - name: Post Scan Results as PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let psRuleResults = '';
            try {
              psRuleResults = fs.readFileSync('ps-rule-results.md', 'utf8');
            } catch (e) {
              psRuleResults = 'No PSRule results available.';
            }

            const output = `#### Security & Best Practice Scan Results

            <details>
            <summary>PSRule for Azure</summary>

            ${psRuleResults}

            </details>

            *Triggered by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  what-if:
    name: What-If (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, acc, prod]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-If
        id: whatif
        run: |
          result=$(az deployment sub what-if \
            --location westeurope \
            --template-file infra/main.bicep \
            --parameters infra/main.${{ matrix.environment }}.bicepparam \
            --no-pretty-print 2>&1) || true
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$result" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post What-If as PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### What-If Results for \`${{ matrix.environment }}\`

            \`\`\`
            ${{ steps.whatif.outputs.result }}
            \`\`\`

            *Triggered by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
