name: Validate Bicep

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - 'bicepconfig.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-scan:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bicep Build
        run: az bicep build --file infra/main.bicep

      - name: PSRule for Azure
        # Blocking: infra/ now carries the same Batch B/C hardening the
        # configurator emits (sku.tier, imageCleaner, defender, autoUpgrade +
        # maintenance, Cilium + overlay + managedNATGateway, azureMonitorProfile
        # + DCR, CSI Secret Store, azurepolicy, costAnalysis, AzureLinux, etc.).
        # Dev-only findings are suppressed in .ps-rule/ps-rule.yaml. If CI turns
        # red on a genuine hardening regression, fix the finding rather than
        # re-setting continue-on-error.
        uses: microsoft/ps-rule@v2
        with:
          modules: PSRule.Rules.Azure
          option: .ps-rule/ps-rule.yaml
          inputPath: infra/
          outputFormat: Markdown
          outputPath: ps-rule-results.md

      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: bicep
          quiet: true
          soft_fail: true
          output_format: github_failed_only

      - name: Post Scan Results as PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let psRuleResults = '';
            try {
              psRuleResults = fs.readFileSync('ps-rule-results.md', 'utf8');
            } catch (e) {
              psRuleResults = 'No PSRule results available.';
            }

            const output = `#### Security & Best Practice Scan Results

            <details>
            <summary>PSRule for Azure</summary>

            ${psRuleResults}

            </details>

            *Triggered by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # NOTE: Azure-auth-dependent jobs removed (2026-04 cleanup).
  # No Entra app registration available on this tenant, so OIDC federation
  # cannot be set up and AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID
  # cannot be populated. Removed:
  #   - what-if (matrix: dev/acc/prod) — ran `az deployment sub what-if`
  #   - deploy.yml + deploy-environment.yml — deployed dev→acc→prod on push to main
  #   - publish-modules.yml — published modules to ACR on tag push
  # Restore via `git log -- .github/workflows/` when tenant access becomes
  # available. The three secrets referenced by these workflows are the only
  # additional configuration needed.
