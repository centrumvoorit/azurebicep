name: Publish Bicep Modules

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ${{ secrets.ACR_REGISTRY_NAME }}.azurecr.io
  MODULE_PATH: bicep/modules

jobs:
  publish:
    name: Publish Modules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish modules to registry
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          modules=(
            "network/vnet:infra/modules/network/vnet.bicep"
            "identity/managedIdentity:infra/modules/identity/managedIdentity.bicep"
            "monitoring/logAnalytics:infra/modules/monitoring/logAnalytics.bicep"
            "acr/containerRegistry:infra/modules/acr/containerRegistry.bicep"
            "keyvault/keyVault:infra/modules/keyvault/keyVault.bicep"
            "aks/aksCluster:infra/modules/aks/aksCluster.bicep"
            "privateEndpoint/privateEndpoint:infra/modules/privateEndpoint/privateEndpoint.bicep"
            "roleAssignment/roleAssignment:infra/modules/roleAssignment/roleAssignment.bicep"
          )

          for entry in "${modules[@]}"; do
            MODULE_NAME="${entry%%:*}"
            MODULE_FILE="${entry##*:}"

            echo "Publishing ${MODULE_NAME} v${VERSION}..."
            az bicep publish \
              --file "$MODULE_FILE" \
              --target "br:${REGISTRY}/${MODULE_PATH}/${MODULE_NAME}:${VERSION}"
          done

          echo ""
          echo "=== All modules published as v${VERSION} ==="
