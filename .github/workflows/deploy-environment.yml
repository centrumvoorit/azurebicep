name: Deploy Environment (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Target environment (dev, acc, prod)'
      param-file:
        required: true
        type: string
        description: 'Path to the .bicepparam file'
      location:
        required: false
        type: string
        default: 'westeurope'
        description: 'Azure deployment location'
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy
        id: deploy
        run: |
          az deployment sub create \
            --location ${{ inputs.location }} \
            --template-file infra/main.bicep \
            --parameters ${{ inputs.param-file }} \
            --name "deploy-${{ inputs.environment }}-${{ github.run_number }}"

      - name: Verify AKS
        run: |
          DEPLOY_NAME="deploy-${{ inputs.environment }}-${{ github.run_number }}"
          CLUSTER_NAME=$(az deployment sub show \
            --name "$DEPLOY_NAME" \
            --query "properties.outputs.aksClusterName.value" -o tsv)
          RG_NAME=$(az deployment sub show \
            --name "$DEPLOY_NAME" \
            --query "properties.outputs.resourceGroupName.value" -o tsv)
          az aks show --name "$CLUSTER_NAME" --resource-group "$RG_NAME" --query "provisioningState" -o tsv
