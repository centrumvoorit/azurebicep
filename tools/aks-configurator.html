// ============================================================
// STATE
// ============================================================

var state = {};
var currentStep = 1;

function initState(env) {
  var defaults = ENV_DEFAULTS[env] || ENV_DEFAULTS.dev;
  state = {};
  var fields = [
    'customerName', 'environment', 'location', 'enablePrivateCluster', 'kubernetesVersion',
    'adminGroupObjectIds', 'tagCostCenter', 'tagOwner', 'tagProject', 'customTags',
    'additionalRoleAssignments', 'vnetAddressPrefix', 'aksSubnetPrefix', 'servicesSubnetPrefix',
    'privateEndpointSubnetPrefix', 'serviceCidr', 'dnsServiceIP', 'apiServerAuthorizedIPs',
    'systemNodeVmSize', 'systemAutoscaling', 'systemNodeCount', 'systemNodeMinCount',
    'systemNodeMaxCount', 'userNodeVmSize', 'userAutoscaling', 'userNodeCount',
    'userNodeMinCount', 'userNodeMaxCount', 'osDiskSizeGB', 'availabilityZones',
    'upgradeChannel', 'maxPodsPerNode', 'deployAcr', 'acrSku', 'deployKeyVault',
    'keyVaultSku', 'deployMonitoring', 'logRetentionDays', 'ecosystemTools'
  ];

  for (var i = 0; i < fields.length; i++) {
    var f = fields[i];
    var val = defaults[f];
    if (val === undefined) {
      if (f === 'customerName') val = '';
      else if (f === 'adminGroupObjectIds') val = [];
      else if (f === 'customTags') val = [];
      else if (f === 'additionalRoleAssignments') val = [];
      else if (f === 'apiServerAuthorizedIPs') val = [];
      else if (f === 'ecosystemTools') val = {};
      else val = '';
    }
    if (Array.isArray(val)) val = val.slice();
    else if (typeof val === 'object' && val !== null) val = Object.assign({}, val);
    state[f] = { value: val, _edited: false };
  }
}

function getVal(key) {
  return state[key] ? state[key].value : undefined;
}

function setVal(key, value) {
  if (!state[key]) state[key] = { value: null, _edited: false };
  if (Array.isArray(value)) value = value.slice();
  else if (typeof value === 'object' && value !== null) value = Object.assign({}, value);
  state[key].value = value;
  state[key]._edited = true;
  autoSave();
  render();
}

function setValNoRender(key, value) {
  if (!state[key]) state[key] = { value: null, _edited: false };
  if (Array.isArray(value)) value = value.slice();
  else if (typeof value === 'object' && value !== null) value = Object.assign({}, value);
  state[key].value = value;
  state[key]._edited = true;
}

function switchEnvironment(newEnv) {
  var defaults = ENV_DEFAULTS[newEnv];
  if (!defaults) return;

  var updatedCount = 0;
  var keys = Object.keys(defaults);
  for (var i = 0; i < keys.length; i++) {
    var key = keys[i];
    if (state[key] && !state[key]._edited) {
      var val = defaults[key];
      if (Array.isArray(val)) val = val.slice();
      else if (typeof val === 'object' && val !== null) val = Object.assign({}, val);
      state[key].value = val;
      updatedCount++;
    }
  }
  state.environment.value = newEnv;
  state.environment._edited = true;

  var banner = document.getElementById('envBanner');
  banner.textContent = 'Switched to ' + newEnv.toUpperCase() + ' environment. ' + updatedCount + ' fields updated to ' + newEnv + ' defaults (user-edited fields preserved).';
  banner.className = 'bg-amber-100 border-b border-amber-300 text-amber-800 text-center py-2 text-sm font-medium';
  setTimeout(function() { banner.classList.add('fade-out'); }, 2500);
  setTimeout(function() { banner.classList.add('hidden'); }, 3000);

  autoSave();
  render();
}

function getFlatState() {
  var flat = {};
  var keys = Object.keys(state);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var val = state[k].value;
    if (Array.isArray(val)) val = val.slice();
    else if (typeof val === 'object' && val !== null) val = Object.assign({}, val);
    flat[k] = val;
  }
  return flat;
}

function getVmVcpu(vmSize) {
  for (var i = 0; i < VM_SIZES.length; i++) {
    if (VM_SIZES[i].name === vmSize) return VM_SIZES[i].vCPU;
  }
  return 2;
}

// ============================================================
// VALIDATION
// ============================================================

function validateStep(stepNum) {
  var result = { errors: [], warnings: [], infos: [] };
  if (stepNum === 1) {
    var name = getVal('customerName') || '';
    if (!name) {
      result.errors.push('Customer name is required.');
    } else {
      if (!/^[a-zA-Z0-9-]+$/.test(name)) {
        result.errors.push('Customer name must contain only alphanumeric characters and hyphens.');
      }
      if (name.length > 15) {
        result.errors.push('Customer name must be 15 characters or less.');
      }
    }
    if (!getVal('location')) {
      result.errors.push('Region is required.');
    }
  }
  if (stepNum === 2) {
    var ids = getVal('adminGroupObjectIds') || [];
    var nonEmpty = ids.filter(function(id) { return id.trim() !== ''; });
    if (nonEmpty.length === 0) {
      result.errors.push('At least one Admin Group Object ID is required.');
    } else {
      var guidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
      for (var i = 0; i < nonEmpty.length; i++) {
        if (!guidRe.test(nonEmpty[i].trim())) {
          result.errors.push('Admin Group Object ID "' + escapeHtml(nonEmpty[i]) + '" is not a valid GUID (expected format: 00000000-0000-0000-0000-000000000000).');
        }
      }
    }
    if (!getVal('tagCostCenter')) {
      result.errors.push('Tag: CostCenter is required.');
    }
    if (!getVal('tagOwner')) {
      result.errors.push('Tag: Owner is required.');
    }
    if (!getVal('tagProject')) {
      result.errors.push('Tag: Project is required.');
    }
  }
  if (stepNum === 3) {
    var vnet = getVal('vnetAddressPrefix') || '';
    var aksSub = getVal('aksSubnetPrefix') || '';
    var svcSub = getVal('servicesSubnetPrefix') || '';
    var peSub = getVal('privateEndpointSubnetPrefix') || '';
    var svcCidr = getVal('serviceCidr') || '';
    var dnsIp = getVal('dnsServiceIP') || '';

    if (!parseCIDR(vnet)) result.errors.push('VNet address prefix is not a valid CIDR.');
    if (!parseCIDR(aksSub)) result.errors.push('AKS subnet prefix is not a valid CIDR.');
    if (!parseCIDR(svcSub)) result.errors.push('Services subnet prefix is not a valid CIDR.');
    if (!parseCIDR(peSub)) result.errors.push('PE subnet prefix is not a valid CIDR.');
    if (!parseCIDR(svcCidr)) result.errors.push('Service CIDR is not a valid CIDR.');

    if (parseCIDR(vnet)) {
      if (parseCIDR(aksSub) && !isWithinCIDR(aksSub, vnet)) result.errors.push('AKS subnet must be within the VNet CIDR.');
      if (parseCIDR(svcSub) && !isWithinCIDR(svcSub, vnet)) result.errors.push('Services subnet must be within the VNet CIDR.');
      if (parseCIDR(peSub) && !isWithinCIDR(peSub, vnet)) result.errors.push('PE subnet must be within the VNet CIDR.');
      if (parseCIDR(svcCidr) && cidrsOverlap(svcCidr, vnet)) result.errors.push('Service CIDR must not overlap the VNet address space.');
    }

    if (parseCIDR(aksSub) && parseCIDR(svcSub) && cidrsOverlap(aksSub, svcSub)) result.errors.push('AKS subnet and Services subnet overlap.');
    if (parseCIDR(aksSub) && parseCIDR(peSub) && cidrsOverlap(aksSub, peSub)) result.errors.push('AKS subnet and PE subnet overlap.');
    if (parseCIDR(svcSub) && parseCIDR(peSub) && cidrsOverlap(svcSub, peSub)) result.errors.push('Services subnet and PE subnet overlap.');

    if (parseCIDR(svcCidr) && dnsIp && !isIPInCIDR(dnsIp, svcCidr)) result.errors.push('DNS service IP must be within the Service CIDR.');

    // Capacity warning: estimate required IPs for AKS subnet
    if (parseCIDR(aksSub)) {
      var sysAutoscaling = getVal('systemAutoscaling');
      var sysMaxCount = getVal('systemNodeMaxCount');
      var sysCount = getVal('systemNodeCount');
      var userAutoscaling = getVal('userAutoscaling');
      var userMaxCount = getVal('userNodeMaxCount');
      var userCount = getVal('userNodeCount');
      var maxPods = getVal('maxPodsPerNode');

      var envDef = ENV_DEFAULTS[getVal('environment') || 'dev'] || ENV_DEFAULTS.dev;
      var maxSystemNodes = (sysAutoscaling !== undefined && sysAutoscaling !== null)
        ? (sysAutoscaling ? (sysMaxCount !== undefined ? sysMaxCount : envDef.systemNodeMaxCount) : (sysCount !== undefined ? sysCount : envDef.systemNodeCount))
        : envDef.systemNodeMaxCount;
      var maxUserNodes = (userAutoscaling !== undefined && userAutoscaling !== null)
        ? (userAutoscaling ? (userMaxCount !== undefined ? userMaxCount : envDef.userNodeMaxCount) : (userCount !== undefined ? userCount : envDef.userNodeCount))
        : envDef.userNodeMaxCount;
      var podsPerNode = (maxPods !== undefined && maxPods !== null) ? maxPods : envDef.maxPodsPerNode;

      var requiredIPs = (maxSystemNodes + maxUserNodes) * podsPerNode + (maxSystemNodes + maxUserNodes);
      var aksCapacity = cidrCapacity(aksSub);
      if (requiredIPs > aksCapacity) {
        result.warnings.push(
          'AKS subnet capacity may be insufficient. Estimated required IPs: ' + requiredIPs +
          ' (nodes: ' + (maxSystemNodes + maxUserNodes) + ', pods/node: ' + podsPerNode + ')' +
          ', subnet capacity: ' + aksCapacity + '. Consider enlarging the AKS subnet.'
        );
      }
    }
  }
  return result;
}

function validateAllSteps() {
  var all = { errors: [], warnings: [], infos: [] };
  for (var i = 1; i <= STEPS.length; i++) {
    var r = validateStep(i);
    for (var j = 0; j < r.errors.length; j++) all.errors.push('Step ' + i + ': ' + r.errors[j]);
    for (var j = 0; j < r.warnings.length; j++) all.warnings.push('Step ' + i + ': ' + r.warnings[j]);
    for (var j = 0; j < r.infos.length; j++) all.infos.push('Step ' + i + ': ' + r.infos[j]);
  }
  return all;
}

// ============================================================
// CIDR_UTILS
// ============================================================

function parseCIDR(cidr) {
  if (!cidr || typeof cidr !== 'string') return null;
  var m = cidr.match(/^(\d+)\.(\d+)\.(\d+)\.(\d+)\/(\d+)$/);
  if (!m) return null;
  var parts = [+m[1], +m[2], +m[3], +m[4]];
  var prefix = +m[5];
  for (var i = 0; i < parts.length; i++) {
    if (parts[i] < 0 || parts[i] > 255) return null;
  }
  if (prefix < 0 || prefix > 32) return null;
  var ip = ((parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]) >>> 0;
  return { ip: ip, prefix: prefix };
}

function cidrCapacity(cidr) {
  var p = parseCIDR(cidr);
  if (!p) return 0;
  if (p.prefix >= 31) return p.prefix === 32 ? 1 : 2;
  return Math.pow(2, 32 - p.prefix) - 2;
}

function cidrRange(cidr) {
  var p = parseCIDR(cidr);
  if (!p) return null;
  var mask = p.prefix === 0 ? 0 : (0xFFFFFFFF << (32 - p.prefix)) >>> 0;
  var start = (p.ip & mask) >>> 0;
  var end = (start | (~mask >>> 0)) >>> 0;
  return { start: start, end: end };
}

function isWithinCIDR(inner, outer) {
  var ri = cidrRange(inner);
  var ro = cidrRange(outer);
  if (!ri || !ro) return false;
  return ri.start >= ro.start && ri.end <= ro.end;
}

function cidrsOverlap(a, b) {
  var ra = cidrRange(a);
  var rb = cidrRange(b);
  if (!ra || !rb) return false;
  return ra.start <= rb.end && rb.start <= ra.end;
}

function isIPInCIDR(ip, cidr) {
  var m = ip.match(/^(\d+)\.(\d+)\.(\d+)\.(\d+)$/);
  if (!m) return false;
  if (+m[1] > 255 || +m[2] > 255 || +m[3] > 255 || +m[4] > 255) return false;
  var ipNum = ((+m[1] << 24) | (+m[2] << 16) | (+m[3] << 8) | +m[4]) >>> 0;
  var r = cidrRange(cidr);
  if (!r) return false;
  return ipNum >= r.start && ipNum <= r.end;
}

function suggestSubnets(vnetPrefix) {
  var p = parseCIDR(vnetPrefix);
  if (!p) return { aksSubnet: '', servicesSubnet: '', peSubnet: '' };
  var mask = p.prefix === 0 ? 0 : (0xFFFFFFFF << (32 - p.prefix)) >>> 0;
  var base = (p.ip & mask) >>> 0;
  var aksStart = base;
  var aks = ((aksStart >>> 24) & 0xFF) + '.' + ((aksStart >>> 16) & 0xFF) + '.' + ((aksStart >>> 8) & 0xFF) + '.' + (aksStart & 0xFF) + '/20';
  var svcStart = (base + 16 * 256) >>> 0;
  var svc = ((svcStart >>> 24) & 0xFF) + '.' + ((svcStart >>> 16) & 0xFF) + '.' + ((svcStart >>> 8) & 0xFF) + '.' + (svcStart & 0xFF) + '/24';
  var peStart = (base + 17 * 256) >>> 0;
  var pe = ((peStart >>> 24) & 0xFF) + '.' + ((peStart >>> 16) & 0xFF) + '.' + ((peStart >>> 8) & 0xFF) + '.' + (peStart & 0xFF) + '/24';
  // Validate suggestions fit inside VNet
  if (!isWithinCIDR(aks, vnetPrefix) || !isWithinCIDR(svc, vnetPrefix) || !isWithinCIDR(pe, vnetPrefix)) {
    return { aksSubnet: '', servicesSubnet: '', peSubnet: '' };
  }
  return { aksSubnet: aks, servicesSubnet: svc, peSubnet: pe };
}

// ============================================================
// RENDER
// ============================================================

function render() {
  renderStepNav();
  renderCurrentStep();
  updateNavButtons();
}

function renderStepNav() {
  var nav = document.getElementById('stepNav');
  var html = '';
  for (var i = 0; i < STEPS.length; i++) {
    var s = STEPS[i];
    var v = validateStep(s.num);
    var active = s.num === currentStep;
    var dot = '';
    if (v.errors.length > 0) dot = '<span class="w-2 h-2 rounded-full bg-red-500 inline-block ml-2"></span>';
    else if (v.warnings.length > 0) dot = '<span class="w-2 h-2 rounded-full bg-yellow-400 inline-block ml-2"></span>';
    html += '<button onclick="goToStep(' + s.num + ')" class="w-full text-left px-3 py-2 rounded-lg mb-1 text-sm flex items-center justify-between ' +
      (active ? 'bg-blue-100 text-blue-800 font-semibold' : 'text-gray-600 hover:bg-gray-100') + '">' +
      '<span><span class="text-xs text-gray-400 mr-2">' + s.num + '.</span>' + s.title + '</span>' + dot + '</button>';
  }
  nav.innerHTML = html;
}

function renderCurrentStep() {
  var main = document.getElementById('mainContent');
  var html = '';
  switch (currentStep) {
    case 1: html = renderStep1(); break;
    case 2: html = renderStep2(); break;
    case 3: html = renderStep3(); break;
    case 4: html = renderStep4(); break;
    case 5: html = renderStep5(); break;
    case 6: html = renderStep6(); break;
    case 7: html = renderStep7(); break;
  }
  main.innerHTML = html;
}

function updateNavButtons() {
  var btnPrev = document.getElementById('btnPrev');
  var btnNext = document.getElementById('btnNext');
  btnPrev.disabled = currentStep === 1;
  if (currentStep === STEPS.length) {
    btnNext.textContent = 'Generate';
    btnNext.className = 'px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700';
  } else {
    btnNext.textContent = 'Next';
    btnNext.className = 'px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700';
  }
}

function nextStep() {
  var v = validateStep(currentStep);
  if (v.errors.length > 0) {
    render();
    return;
  }
  if (currentStep < STEPS.length) {
    currentStep++;
    render();
    window.scrollTo(0, 0);
  }
}

function prevStep() {
  if (currentStep > 1) {
    currentStep--;
    render();
    window.scrollTo(0, 0);
  }
}

function goToStep(n) {
  if (n >= 1 && n <= STEPS.length) {
    currentStep = n;
    render();
    window.scrollTo(0, 0);
  }
}

function onVnetChange(value) {
  setValNoRender('vnetAddressPrefix', value);
  var suggestions = suggestSubnets(value);
  if (suggestions.aksSubnet && !state.aksSubnetPrefix._edited) {
    setValNoRender('aksSubnetPrefix', suggestions.aksSubnet);
  }
  if (suggestions.servicesSubnet && !state.servicesSubnetPrefix._edited) {
    setValNoRender('servicesSubnetPrefix', suggestions.servicesSubnet);
  }
  if (suggestions.peSubnet && !state.privateEndpointSubnetPrefix._edited) {
    setValNoRender('privateEndpointSubnetPrefix', suggestions.peSubnet);
  }
  autoSave();
  render();
}

function renderMultiInput(key, values, placeholder) {
  var inputSmCls = 'flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500';
  var btnDangerCls = 'px-2 py-1.5 text-xs border border-red-300 text-red-600 rounded hover:bg-red-50 flex-shrink-0';
  var btnAddCls = 'mt-2 px-3 py-1.5 text-xs border border-blue-300 text-blue-600 rounded hover:bg-blue-50';
  var arr = values || [];
  if (arr.length === 0) arr = [''];
  var html = '';
  for (var i = 0; i < arr.length; i++) {
    html +=
      '<div class="flex gap-2 mb-2">' +
        '<input type="text" value="' + escapeHtml(arr[i]) + '" placeholder="' + escapeHtml(placeholder) + '"' +
          ' oninput="updateArrayItem(\'' + key + '\',' + i + ',this.value)"' +
          ' class="' + inputSmCls + ' font-mono">' +
        '<button onclick="removeArrayItem(\'' + key + '\',' + i + ')" class="' + btnDangerCls + '" title="Remove">&#x2715;</button>' +
      '</div>';
  }
  html += '<button onclick="addArrayItem(\'' + key + '\')" class="' + btnAddCls + '">+ Add IP Range</button>';
  return html;
}

function renderSubnetVisual(s) {
  var vnet = s.vnetAddressPrefix;
  var aksCidr = s.aksSubnetPrefix;
  var svcCidr = s.servicesSubnetPrefix;
  var peCidr = s.privateEndpointSubnetPrefix;

  var vnetCap = cidrCapacity(vnet);
  var aksCap = cidrCapacity(aksCidr);
  var svcCap = cidrCapacity(svcCidr);
  var peCap = cidrCapacity(peCidr);

  if (!parseCIDR(vnet) || vnetCap === 0) {
    return '<div class="text-xs text-gray-400 italic">Enter a valid VNet CIDR to see subnet layout.</div>';
  }

  // Calculate percentages for bar
  var aksValid = parseCIDR(aksCidr) && isWithinCIDR(aksCidr, vnet);
  var svcValid = parseCIDR(svcCidr) && isWithinCIDR(svcCidr, vnet);
  var peValid = parseCIDR(peCidr) && isWithinCIDR(peCidr, vnet);

  var aksCount = aksValid ? aksCap : 0;
  var svcCount = svcValid ? svcCap : 0;
  var peCount = peValid ? peCap : 0;
  var usedCount = aksCount + svcCount + peCount;
  var freeCount = vnetCap - usedCount;
  if (freeCount < 0) freeCount = 0;

  var aksPct = vnetCap > 0 ? (aksCount / vnetCap * 100).toFixed(1) : 0;
  var svcPct = vnetCap > 0 ? (svcCount / vnetCap * 100).toFixed(1) : 0;
  var pePct = vnetCap > 0 ? (peCount / vnetCap * 100).toFixed(1) : 0;
  var freePct = vnetCap > 0 ? (freeCount / vnetCap * 100).toFixed(1) : 0;

  var barHtml = '<div class="flex rounded overflow-hidden h-6 text-xs font-medium">';
  if (aksCount > 0) {
    barHtml += '<div class="bg-blue-500 text-white flex items-center justify-center overflow-hidden" style="width:' + aksPct + '%">' +
      (parseFloat(aksPct) > 8 ? 'AKS' : '') + '</div>';
  }
  if (svcCount > 0) {
    barHtml += '<div class="bg-green-500 text-white flex items-center justify-center overflow-hidden" style="width:' + svcPct + '%">' +
      (parseFloat(svcPct) > 8 ? 'Svc' : '') + '</div>';
  }
  if (peCount > 0) {
    barHtml += '<div class="bg-purple-500 text-white flex items-center justify-center overflow-hidden" style="width:' + pePct + '%">' +
      (parseFloat(pePct) > 8 ? 'PE' : '') + '</div>';
  }
  if (freeCount > 0) {
    barHtml += '<div class="bg-gray-200 text-gray-500 flex items-center justify-center overflow-hidden" style="width:' + freePct + '%">' +
      (parseFloat(freePct) > 8 ? 'Free' : '') + '</div>';
  }
  barHtml += '</div>';

  var legendHtml = '<div class="flex flex-wrap gap-4 mt-2 text-xs text-gray-600">' +
    (aksCount > 0 ? '<span class="flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-sm bg-blue-500"></span>AKS: ' + aksCount.toLocaleString() + ' IPs (' + aksCidr + ')</span>' : '') +
    (svcCount > 0 ? '<span class="flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-sm bg-green-500"></span>Services: ' + svcCount.toLocaleString() + ' IPs (' + svcCidr + ')</span>' : '') +
    (peCount > 0 ? '<span class="flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-sm bg-purple-500"></span>PE: ' + peCount.toLocaleString() + ' IPs (' + peCidr + ')</span>' : '') +
    (freeCount > 0 ? '<span class="flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-sm bg-gray-300"></span>Free: ' + freeCount.toLocaleString() + ' IPs</span>' : '') +
    '</div>' +
    '<p class="text-xs text-gray-400 mt-1">VNet total: ' + vnetCap.toLocaleString() + ' IPs (' + vnet + ')</p>';

  return barHtml + legendHtml;
}

        ' oninput="onVnetChange(this.value)" class="' + inputCls + ' font-mono">',

      'CIDR block for the virtual network. Changing this auto-suggests subnet prefixes for fields you have not manually edited.') +

    '<div class="grid grid-cols-3 gap-4 mb-4">' +
      '<div>' +
        '<label class="block text-sm font-medium text-gray-700 mb-1">AKS Subnet ' + badge('params') + '</label>' +
        '<input type="text" value="' + escapeHtml(aksSub) + '" placeholder="e.g. 10.1.0.0/20"' +
          ' oninput="setVal(\'aksSubnetPrefix\', this.value)" class="' + inputCls + ' font-mono">' +
        '<p class="text-xs text-gray-500 mt-1">Node and pod IPs. Needs enough space for max pods per node times max node count.</p>' +
      '</div>' +
      '<div>' +
        '<label class="block text-sm font-medium text-gray-700 mb-1">Services Subnet ' + badge('params') + '</label>' +
        '<input type="text" value="' + escapeHtml(svcSub) + '" placeholder="e.g. 10.1.16.0/24"' +
          ' oninput="setVal(\'servicesSubnetPrefix\', this.value)" class="' + inputCls + ' font-mono">' +
        '<p class="text-xs text-gray-500 mt-1">Subnet for AKS internal load balancers and cluster-internal services.</p>' +
      '</div>' +
      '<div>' +
        '<label class="block text-sm font-medium text-gray-700 mb-1">PE Subnet ' + badge('params') + '</label>' +
        '<input type="text" value="' + escapeHtml(peSub) + '" placeholder="e.g. 10.1.17.0/24"' +
          ' oninput="setVal(\'privateEndpointSubnetPrefix\', this.value)" class="' + inputCls + ' font-mono">' +
        '<p class="text-xs text-gray-500 mt-1">Subnet for private endpoints (ACR, Key Vault, etc.). Separate from node subnet.</p>' +
      '</div>' +
    '</div>' +

    fieldRow('Service CIDR',
      '<input type="text" value="' + escapeHtml(svcCidr) + '" placeholder="10.0.0.0/16"' +
        ' oninput="setVal(\'serviceCidr\', this.value)" class="' + inputCls + ' font-mono">',
      'params',
      'IP range for Kubernetes internal services (ClusterIP). Must not overlap VNet address space.') +

    fieldRow('DNS Service IP',
      '<input type="text" value="' + escapeHtml(dnsIp) + '" placeholder="10.0.0.10"' +
        ' oninput="setVal(\'dnsServiceIP\', this.value)" class="' + inputCls + ' font-mono">',

      'IP address within the Service CIDR assigned to the cluster DNS service (CoreDNS).') +

    (!isPrivate ?

      '') +

    '<div class="mt-6">' +
      '<h3 class="text-sm font-semibold text-gray-700 mb-2">Subnet Layout</h3>' +
      '<div class="bg-gray-50 border border-gray-200 rounded-lg p-4">' +

}

// ============================================================
// PERSISTENCE
// ============================================================

var STORAGE_KEY = 'aksConfigurator_state';
var STORAGE_STEP_KEY = 'aksConfigurator_step';

function autoSave() {
  try {
    var data = {};
    var keys = Object.keys(state);
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      data[k] = { value: state[k].value, _edited: state[k]._edited };
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    localStorage.setItem(STORAGE_STEP_KEY, String(currentStep));
    var el = document.getElementById('saveStatus');
    if (el) {
      el.textContent = 'Auto-saved';
      el.className = 'text-xs text-gray-400 absolute right-4 bottom-1';
    }
  } catch (e) {
    var el = document.getElementById('saveStatus');
    if (el) {
      el.textContent = 'Save failed';
      el.className = 'text-xs text-red-400 absolute right-4 bottom-1';
    }
  }
}

function autoRestore() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    var data = JSON.parse(raw);
    if (!data || typeof data !== 'object' || !data.environment) return false;
    state = {};
    var keys = Object.keys(data);
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      var val = data[k].value;
      if (Array.isArray(val)) val = val.slice();
      else if (typeof val === 'object' && val !== null) val = Object.assign({}, val);
      state[k] = { value: val, _edited: !!data[k]._edited };
    }
    var savedStep = localStorage.getItem(STORAGE_STEP_KEY);
    if (savedStep) {
      var n = parseInt(savedStep, 10);
      if (n >= 1 && n <= STEPS.length) currentStep = n;
    }
    return true;
  } catch (e) {
    return false;
  }
}

function resetState() {
  if (!confirm('Reset all configuration to defaults? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_STEP_KEY);
  currentStep = 1;
  initState('dev');
  render();
}

function saveConfig() {
  var data = getFlatState();
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'aks-config-' + (getVal('customerName') || 'unnamed') + '-' + (getVal('environment') || 'dev') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function loadConfig() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        initState(data.environment || 'dev');
        var keys = Object.keys(data);
        for (var i = 0; i < keys.length; i++) {
          var k = keys[i];
          if (state[k] !== undefined) {
            state[k].value = data[k];
            state[k]._edited = true;
          }
        }
        autoSave();
        render();
      } catch (err) {
        alert('Failed to load configuration: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ============================================================
// INIT
// ============================================================

(function init() {
  if (!autoRestore()) {
    initState('dev');
  }
  render();
})();
