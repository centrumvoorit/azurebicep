<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKS Configurator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  .fade-out { animation: fadeOut 0.5s ease-out forwards; }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
</style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<!-- Header -->
<header class="bg-gradient-to-r from-blue-700 to-blue-900 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold">AKS Configurator</h1>
      <p class="text-blue-200 text-sm">Azure Kubernetes Service deployment wizard</p>
    </div>
    <span class="bg-blue-600 text-blue-100 text-xs px-3 py-1 rounded-full font-mono">v1.5 | Compatible with azurebicep modules v1.x</span>
  </div>
</header>

<!-- Environment change banner -->
<div id="envBanner" class="hidden bg-amber-100 border-b border-amber-300 text-amber-800 text-center py-2 text-sm font-medium"></div>

<!-- Main layout -->
<div class="flex-1 flex max-w-7xl mx-auto w-full">
  <!-- Sidebar -->
  <nav id="stepNav" class="w-64 bg-white border-r border-gray-200 p-4 flex-shrink-0"></nav>
  <!-- Content -->
  <main id="mainContent" class="flex-1 p-6 overflow-y-auto"></main>
</div>

<!-- Bottom navigation -->
<footer class="bg-white border-t border-gray-200 shadow-inner">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between relative">
    <div class="flex gap-2">
      <button id="btnPrev" onclick="prevStep()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">Previous</button>
      <button id="btnNext" onclick="nextStep()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Next</button>
    </div>
    <div class="flex gap-2">
      <button onclick="saveConfig()" class="px-3 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 text-sm">Save</button>
      <button onclick="loadConfig()" class="px-3 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 text-sm">Load</button>
      <button onclick="resetState()" class="px-3 py-2 border border-red-300 rounded-lg text-red-600 hover:bg-red-50 text-sm">Reset</button>
    </div>
    <!-- Save status indicator -->
    <div id="saveStatus" class="text-xs text-gray-400 absolute right-4 bottom-1">Auto-saved</div>
  </div>
</footer>

var BICEP_TEMPLATES = {

// User-Defined Types for compile-time validation
// Fouten worden in de IDE gevangen, niet na een 20-minuten pipeline run.
// ============================================================================

@export()
@description('Deployment environment')
type environmentType = 'dev' | 'acc' | 'prod'

@export()
@description('Standard resource tags \u2014 extra tags zijn toegestaan')
type tagsType = {

  Project: string

}

@export()

  aksSubnetPrefix: string

  @description('Address prefix for the services subnet (e.g., 10.1.16.0/24)')

  @description('Address prefix for the private endpoints subnet (e.g., 10.1.17.0/24)')

}

@export()

type aksConfigType = {
  @description('Kubernetes version (e.g., 1.35)')

  @description('System node pool VM count (initial; within min/max when autoscaling)')

  @description('System node pool VM size (e.g., Standard_D2s_v5)')

  @description('System node pool autoscaler lower bound')

  @description('User node pool VM count (initial; within min/max when autoscaling)')

  @description('User node pool autoscaler lower bound')

  @description('Enable private AKS cluster (recommended for acc/prod)')

  @description('Availability zones for agent pools (e.g., ["1","2","3"]). Empty array = regional placement.')
  availabilityZones: string[]

  @description('Authorized IP CIDR ranges for the API server (public clusters only). Empty array = allow all.')
  apiServerAuthorizedIPRanges: string[]

  @description('AKS SKU tier — Free (no SLA, dev only), Standard (uptime SLA), Premium (LTS)')
  skuTier: 'Free' | 'Standard' | 'Premium'

  @description('Control-plane auto-upgrade channel')
  upgradeChannel: 'none' | 'patch' | 'stable' | 'rapid' | 'node-image'

  @description('Node OS auto-upgrade channel')
  nodeOSUpgradeChannel: 'None' | 'Unmanaged' | 'SecurityPatch' | 'NodeImage'

  @description('Node OS disk type — Ephemeral (faster, cheaper, limited by VM cache size) or Managed')

  @description('Node OS disk size in GB')

  @description('Max pods per node (PSRule.Azure.AKS.NodeMinPods wants >= 50 for efficient utilisation; 110 is AKS default with Overlay)')
  maxPodsPerNode: int

  @description('Number of managed outbound public IPs for NAT gateway (each provides ~64k SNAT ports)')
  natGatewayOutboundIpCount: int?

  @description('NAT gateway idle timeout in minutes (4–120)')
  natGatewayIdleTimeoutMinutes: int?
}

@description('Feature flags to enable or disable building blocks')
type featureFlagsType = {

@export()

// ============================================================
// STATE
// ============================================================

var state = {};
var currentStep = 1;

function initState(env) {
  var defaults = ENV_DEFAULTS[env] || ENV_DEFAULTS.dev;
  state = {};
  var fields = [
    'customerName', 'environment', 'location', 'enablePrivateCluster', 'kubernetesVersion',
    'skuTier', 'adminGroupObjectIds', 'tagCostCenter', 'tagOwner', 'tagProject', 'customTags',
    'additionalRoleAssignments', 'vnetAddressPrefix', 'aksSubnetPrefix', 'servicesSubnetPrefix',
    'privateEndpointSubnetPrefix', 'serviceCidr', 'dnsServiceIP', 'apiServerAuthorizedIPs',
    'systemNodeVmSize', 'systemAutoscaling', 'systemNodeCount', 'systemNodeMinCount',
    'systemNodeMaxCount', 'userNodeVmSize', 'userAutoscaling', 'userNodeCount',
    'userNodeMinCount', 'userNodeMaxCount', 'osDiskType', 'osDiskSizeGB', 'availabilityZones',
    'upgradeChannel', 'nodeOSUpgradeChannel', 'maxPodsPerNode', 'deployAcr', 'acrSku', 'deployKeyVault',
    'keyVaultSku', 'deployMonitoring', 'logRetentionDays', 'ecosystemTools'
  ];

  for (var i = 0; i < fields.length; i++) {
    var f = fields[i];
    var val = defaults[f];
    if (val === undefined) {
      if (f === 'customerName') val = '';
      else if (f === 'adminGroupObjectIds') val = [''];
      else if (f === 'customTags') val = [];
      else if (f === 'additionalRoleAssignments') val = [];
      else if (f === 'apiServerAuthorizedIPs') val = [];
      else if (f === 'ecosystemTools') val = {};
      else val = '';
    }
    if (Array.isArray(val)) val = val.slice();
    else if (typeof val === 'object' && val !== null) val = Object.assign({}, val);
    state[f] = { value: val, _edited: false };
  }
}

function getVal(key) {
  return state[key] ? state[key].value : undefined;
}

var _renderTimer = null;
function setVal(key, value) {
  if (!state[key]) state[key] = { value: null, _edited: false };
  if (Array.isArray(value)) value = value.slice();
  else if (typeof value === 'object' && value !== null) value = Object.assign({}, value);
  state[key].value = value;
  state[key]._edited = true;
  autoSave();
  // Debounced focus-preserving render
  if (_renderTimer) clearTimeout(_renderTimer);
  _renderTimer = setTimeout(function() {
    _renderTimer = null;
    renderPreservingFocus();
  }, 400);
}

function renderPreservingFocus() {
  var focused = document.activeElement;
  var tag = focused ? focused.tagName : '';
  var isInput = (tag === 'INPUT' || tag === 'TEXTAREA');
  // Find the focused input by matching its oninput attribute or position
  var focusSelector = null;
  var cursorPos = null;
  if (isInput && focused.getAttribute('oninput')) {
    focusSelector = focused.getAttribute('oninput');
    cursorPos = focused.selectionStart;
  }
  render();
  // Restore focus by finding input with matching oninput handler
  if (focusSelector) {
    var inputs = document.querySelectorAll('input, textarea');
    for (var i = 0; i < inputs.length; i++) {
      if (inputs[i].getAttribute('oninput') === focusSelector) {
        inputs[i].focus();
        if (cursorPos !== null) {
          try { inputs[i].setSelectionRange(cursorPos, cursorPos); } catch(e) {}
        }
        break;
      }
    }
  }
}

// Immediate render variant for toggles/selects that need instant UI feedback
function setValNow(key, value) {
  if (!state[key]) state[key] = { value: null, _edited: false };
  if (Array.isArray(value)) value = value.slice();
  else if (typeof value === 'object' && value !== null) value = Object.assign({}, value);
  state[key].value = value;
  state[key]._edited = true;
  autoSave();
  if (_renderTimer) clearTimeout(_renderTimer);
  _renderTimer = null;
  render();
}

function setValNoRender(key, value) {
  if (!state[key]) state[key] = { value: null, _edited: false };
  if (Array.isArray(value)) value = value.slice();
  else if (typeof value === 'object' && value !== null) value = Object.assign({}, value);
  state[key].value = value;
  state[key]._edited = true;
}

function switchEnvironment(newEnv) {
  var defaults = ENV_DEFAULTS[newEnv];
  if (!defaults) return;

  var updatedCount = 0;
  var keys = Object.keys(defaults);
  for (var i = 0; i < keys.length; i++) {
    var key = keys[i];
    if (state[key] && !state[key]._edited) {
      var val = defaults[key];
      if (Array.isArray(val)) val = val.slice();
      else if (typeof val === 'object' && val !== null) val = Object.assign({}, val);
      state[key].value = val;
      updatedCount++;
    }
  }

  state.environment._edited = true;

  banner.textContent = 'Switched to ' + newEnv.toUpperCase() + ' environment. ' + updatedCount + ' fields updated to ' + newEnv + ' defaults (user-edited fields preserved).';
  banner.className = 'bg-amber-100 border-b border-amber-300 text-amber-800 text-center py-2 text-sm font-medium';
  setTimeout(function() { banner.classList.add('fade-out'); }, 2500);
  setTimeout(function() { banner.classList.add('hidden'); }, 3000);

  autoSave();
  render();
}

function getFlatState() {

  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var val = state[k].value;
    if (Array.isArray(val)) val = val.slice();
    else if (typeof val === 'object' && val !== null) val = Object.assign({}, val);
    flat[k] = val;
  }
  return flat;
}

function getVmVcpu(vmSize) {

    if (VM_SIZES[i].name === vmSize) return VM_SIZES[i].vCPU;

}

// ============================================================
// VALIDATION
// ============================================================

function validateStep(stepNum) {
  var result = { errors: [], warnings: [], infos: [] };
  if (stepNum === 1) {
    var name = getVal('customerName') || '';
    if (!name) {
      result.errors.push('Customer name is required.');
    } else {
      if (!/^[a-zA-Z0-9-]+$/.test(name)) {
        result.errors.push('Customer name must contain only alphanumeric characters and hyphens.');
      }
      if (name.length > 15) {
        result.errors.push('Customer name must be 15 characters or less.');
      }
    }
    if (!getVal('location')) {
      result.errors.push('Region is required.');
    }
  }
  if (stepNum === 2) {
    var ids = getVal('adminGroupObjectIds') || [];
    var nonEmpty = ids.filter(function(id) { return id.trim() !== ''; });
    if (nonEmpty.length === 0) {
      result.errors.push('At least one Admin Group Object ID is required.');
    } else {
      var guidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
      var placeholderGuids = [
        '00000000-0000-0000-0000-000000000000',
        '11111111-1111-1111-1111-111111111111'
      ];
      for (var i = 0; i < nonEmpty.length; i++) {
        var trimmed = nonEmpty[i].trim();
        if (!guidRe.test(trimmed)) {
          result.errors.push('Admin Group Object ID "' + escapeHtml(nonEmpty[i]) + '" is not a valid GUID (expected format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx).');

        }
      }
    }
    if (!getVal('tagCostCenter')) {
      result.errors.push('Tag: CostCenter is required.');
    }
    if (!getVal('tagOwner')) {
      result.errors.push('Tag: Owner is required.');
    }
    if (!getVal('tagProject')) {
      result.errors.push('Tag: Project is required.');
    }
  }
  if (stepNum === 3) {
    var vnet = getVal('vnetAddressPrefix') || '';
    var aksSub = getVal('aksSubnetPrefix') || '';
    var svcSub = getVal('servicesSubnetPrefix') || '';
    var peSub = getVal('privateEndpointSubnetPrefix') || '';
    var svcCidr = getVal('serviceCidr') || '';
    var dnsIp = getVal('dnsServiceIP') || '';

    if (!parseCIDR(vnet)) result.errors.push('VNet address prefix is not a valid CIDR.');
    if (!parseCIDR(aksSub)) result.errors.push('AKS subnet prefix is not a valid CIDR.');
    if (!parseCIDR(svcSub)) result.errors.push('Services subnet prefix is not a valid CIDR.');
    if (!parseCIDR(peSub)) result.errors.push('PE subnet prefix is not a valid CIDR.');
    if (!parseCIDR(svcCidr)) result.errors.push('Service CIDR is not a valid CIDR.');

    if (parseCIDR(vnet)) {
      if (parseCIDR(aksSub) && !isWithinCIDR(aksSub, vnet)) result.errors.push('AKS subnet must be within the VNet CIDR.');
      if (parseCIDR(svcSub) && !isWithinCIDR(svcSub, vnet)) result.errors.push('Services subnet must be within the VNet CIDR.');
      if (parseCIDR(peSub) && !isWithinCIDR(peSub, vnet)) result.errors.push('PE subnet must be within the VNet CIDR.');
      if (parseCIDR(svcCidr) && cidrsOverlap(svcCidr, vnet)) result.errors.push('Service CIDR must not overlap the VNet address space.');
    }

    if (parseCIDR(aksSub) && parseCIDR(svcSub) && cidrsOverlap(aksSub, svcSub)) result.errors.push('AKS subnet and Services subnet overlap.');
    if (parseCIDR(aksSub) && parseCIDR(peSub) && cidrsOverlap(aksSub, peSub)) result.errors.push('AKS subnet and PE subnet overlap.');
    if (parseCIDR(svcSub) && parseCIDR(peSub) && cidrsOverlap(svcSub, peSub)) result.errors.push('Services subnet and PE subnet overlap.');

    if (dnsIp && !/^\d+\.\d+\.\d+\.\d+$/.test(dnsIp)) {
      result.errors.push('DNS service IP is not a valid IP address.');
    } else if (parseCIDR(svcCidr) && dnsIp && !isIPInCIDR(dnsIp, svcCidr)) {
      result.errors.push('DNS service IP must be within the Service CIDR.');
    }

    if (parseCIDR(aksSub)) {
      var sysAutoscaling = getVal('systemAutoscaling');
      var sysMaxCount = getVal('systemNodeMaxCount');
      var sysCount = getVal('systemNodeCount');
      var userAutoscaling = getVal('userAutoscaling');
      var userMaxCount = getVal('userNodeMaxCount');
      var userCount = getVal('userNodeCount');
      var maxPods = getVal('maxPodsPerNode');

      var envDef = ENV_DEFAULTS[getVal('environment') || 'dev'] || ENV_DEFAULTS.dev;
      var maxSystemNodes = (sysAutoscaling !== undefined && sysAutoscaling !== null)
        ? (sysAutoscaling ? (sysMaxCount !== undefined ? sysMaxCount : envDef.systemNodeMaxCount) : (sysCount !== undefined ? sysCount : envDef.systemNodeCount))
        : envDef.systemNodeMaxCount;
      var maxUserNodes = (userAutoscaling !== undefined && userAutoscaling !== null)
        ? (userAutoscaling ? (userMaxCount !== undefined ? userMaxCount : envDef.userNodeMaxCount) : (userCount !== undefined ? userCount : envDef.userNodeCount))
        : envDef.userNodeMaxCount;
      var podsPerNode = (maxPods !== undefined && maxPods !== null) ? maxPods : envDef.maxPodsPerNode;

      var requiredIPs = (maxSystemNodes + maxUserNodes) * podsPerNode + (maxSystemNodes + maxUserNodes);
      var aksCapacity = Math.max(0, cidrCapacity(aksSub) - 5); // Azure reserves 5 IPs per subnet

    var sysAuto = getVal('systemAutoscaling');
    if (sysAuto) {

      var sMaxCount = getVal('systemNodeMaxCount');
      if (!sMinCount || sMinCount < 1) {

      if (!sMaxCount || sMaxCount < 1) {
        result.errors.push('System pool maximum node count must be at least 1.');
      }
      if (sMinCount >= 1 && sMaxCount >= 1 && sMaxCount < sMinCount) {
        result.errors.push('System pool maximum node count must be greater than or equal to minimum node count.');
      }
    } else {

      if (!sCount || sCount < 1) {
        result.errors.push('System pool node count must be at least 1.');
      }
    }

    var userAuto = getVal('userAutoscaling');
    if (userAuto) {
      var uMinCount = getVal('userNodeMinCount');
      var uMaxCount = getVal('userNodeMaxCount');
      if (!uMinCount || uMinCount < 1) {
        result.errors.push('User pool minimum node count must be at least 1.');
      }
      if (!uMaxCount || uMaxCount < 1) {
        result.errors.push('User pool maximum node count must be at least 1.');
      }
      if (uMinCount >= 1 && uMaxCount >= 1 && uMaxCount < uMinCount) {
        result.errors.push('User pool maximum node count must be greater than or equal to minimum node count.');
      }
    } else {
      var uCount = getVal('userNodeCount');
      if (!uCount || uCount < 1) {
        result.errors.push('User pool node count must be at least 1.');
      }
    }
  }
  if (stepNum === 5) {
    var privateCluster = getVal('enablePrivateCluster');
    var acrEnabled = getVal('deployAcr');
    var acrSkuVal = getVal('acrSku') || 'Standard';
    if (privateCluster && acrEnabled && acrSkuVal !== 'Premium') {
      result.warnings.push('Private clusters require Premium ACR SKU for private endpoints.');
    }
    var monitoringEnabled = getVal('deployMonitoring');
    if (!monitoringEnabled) {
      var ecosystemToolsVal = getVal('ecosystemTools') || {};
      var monitoringTools = ['kube-prometheus-stack', 'azure-monitor'];
      var hasMonitoringTool = false;
      for (var mt = 0; mt < monitoringTools.length; mt++) {
        if (ecosystemToolsVal[monitoringTools[mt]]) {
          hasMonitoringTool = true;
          break;
        }
      }
      if (hasMonitoringTool) {
        result.warnings.push('Monitoring is disabled but monitoring ecosystem tools are selected.');
      }
    }
  }
  if (stepNum === 6) {
    var ecoTools = getVal('ecosystemTools') || {};

    // Check conflict pairs across all categories (deduplicated)
    var seenConflicts = {};
    var catKeys6 = Object.keys(ECOSYSTEM_TOOLS);
    for (var ci6 = 0; ci6 < catKeys6.length; ci6++) {
      var cat6Tools = ECOSYSTEM_TOOLS[catKeys6[ci6]].tools;
      for (var ti6 = 0; ti6 < cat6Tools.length; ti6++) {
        var tool6 = cat6Tools[ti6];
        if (!ecoTools[tool6.id]) continue;
        if (!tool6.conflicts) continue;
        for (var xi = 0; xi < tool6.conflicts.length; xi++) {
          var conflictId = tool6.conflicts[xi];
          if (ecoTools[conflictId]) {
            var pairKey = [tool6.id, conflictId].sort().join('::');
            if (seenConflicts[pairKey]) continue;
            seenConflicts[pairKey] = true;
            // Find the conflicting tool label
            var conflictLabel = conflictId;
            var catKeys6b = Object.keys(ECOSYSTEM_TOOLS);
            for (var ci6b = 0; ci6b < catKeys6b.length; ci6b++) {
              var cat6bTools = ECOSYSTEM_TOOLS[catKeys6b[ci6b]].tools;
              for (var ti6b = 0; ti6b < cat6bTools.length; ti6b++) {
                if (cat6bTools[ti6b].id === conflictId) {
                  conflictLabel = cat6bTools[ti6b].label;
                }
              }
            }
            result.warnings.push(tool6.label + ' and ' + conflictLabel + ' cannot be used together.');
          }
        }
      }
    }

    // Check requirements for each enabled tool
    var catKeys6r = Object.keys(ECOSYSTEM_TOOLS);
    for (var ci6r = 0; ci6r < catKeys6r.length; ci6r++) {
      var cat6rTools = ECOSYSTEM_TOOLS[catKeys6r[ci6r]].tools;
      for (var ti6r = 0; ti6r < cat6rTools.length; ti6r++) {
        var tool6r = cat6rTools[ti6r];
        if (!ecoTools[tool6r.id]) continue;
        if (!tool6r.requirements) continue;
        var reqMsgs6 = tool6r.requirements(state);
        if (reqMsgs6 && reqMsgs6.length) {
          for (var ri6 = 0; ri6 < reqMsgs6.length; ri6++) {
            result.warnings.push(tool6r.label + ': ' + reqMsgs6[ri6]);
          }
        }
      }
    }
  }
  return result;
}

function validateAllSteps() {
  var all = { errors: [], warnings: [], infos: [] };
  for (var i = 1; i <= STEPS.length; i++) {
    var r = validateStep(i);
    for (var j = 0; j < r.errors.length; j++) all.errors.push('Step ' + i + ': ' + r.errors[j]);
    for (var j = 0; j < r.warnings.length; j++) all.warnings.push('Step ' + i + ': ' + r.warnings[j]);
    for (var j = 0; j < r.infos.length; j++) all.infos.push('Step ' + i + ': ' + r.infos[j]);
  }
  return all;
}

// ============================================================
// CIDR_UTILS
// ============================================================

function parseCIDR(cidr) {
  if (!cidr || typeof cidr !== 'string') return null;
  var m = cidr.match(/^(\d+)\.(\d+)\.(\d+)\.(\d+)\/(\d+)$/);
  if (!m) return null;
  var parts = [+m[1], +m[2], +m[3], +m[4]];
  var prefix = +m[5];
  for (var i = 0; i < parts.length; i++) {
    if (parts[i] < 0 || parts[i] > 255) return null;
  }
  if (prefix < 0 || prefix > 32) return null;
  var ip = ((parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]) >>> 0;
  return { ip: ip, prefix: prefix };
}

function cidrCapacity(cidr) {
  var p = parseCIDR(cidr);
  if (!p) return 0;
  if (p.prefix >= 31) return p.prefix === 32 ? 1 : 2;
  return Math.pow(2, 32 - p.prefix) - 2;
}

function cidrRange(cidr) {
  var p = parseCIDR(cidr);
  if (!p) return null;
  var mask = p.prefix === 0 ? 0 : (0xFFFFFFFF << (32 - p.prefix)) >>> 0;
  var start = (p.ip & mask) >>> 0;
  var end = (start | (~mask >>> 0)) >>> 0;
  return { start: start, end: end };
}

function isWithinCIDR(inner, outer) {
  var ri = cidrRange(inner);
  var ro = cidrRange(outer);
  if (!ri || !ro) return false;
  return ri.start >= ro.start && ri.end <= ro.end;
}

function cidrsOverlap(a, b) {
  var ra = cidrRange(a);
  var rb = cidrRange(b);
  if (!ra || !rb) return false;
  return ra.start <= rb.end && rb.start <= ra.end;
}

function isIPInCIDR(ip, cidr) {
  var m = ip.match(/^(\d+)\.(\d+)\.(\d+)\.(\d+)$/);
  if (!m) return false;
  if (+m[1] > 255 || +m[2] > 255 || +m[3] > 255 || +m[4] > 255) return false;
  var ipNum = ((+m[1] << 24) | (+m[2] << 16) | (+m[3] << 8) | +m[4]) >>> 0;
  var r = cidrRange(cidr);
  if (!r) return false;
  return ipNum >= r.start && ipNum <= r.end;
}

function suggestSubnets(vnetPrefix) {
  var p = parseCIDR(vnetPrefix);
  if (!p) return { aksSubnet: '', servicesSubnet: '', peSubnet: '' };
  var mask = p.prefix === 0 ? 0 : (0xFFFFFFFF << (32 - p.prefix)) >>> 0;
  var base = (p.ip & mask) >>> 0;
  var aksStart = base;
  var aks = ((aksStart >>> 24) & 0xFF) + '.' + ((aksStart >>> 16) & 0xFF) + '.' + ((aksStart >>> 8) & 0xFF) + '.' + (aksStart & 0xFF) + '/20';
  var svcStart = (base + 16 * 256) >>> 0;
  var svc = ((svcStart >>> 24) & 0xFF) + '.' + ((svcStart >>> 16) & 0xFF) + '.' + ((svcStart >>> 8) & 0xFF) + '.' + (svcStart & 0xFF) + '/24';
  var peStart = (base + 17 * 256) >>> 0;
  var pe = ((peStart >>> 24) & 0xFF) + '.' + ((peStart >>> 16) & 0xFF) + '.' + ((peStart >>> 8) & 0xFF) + '.' + (peStart & 0xFF) + '/24';
  // Validate suggestions fit inside VNet
  if (!isWithinCIDR(aks, vnetPrefix) || !isWithinCIDR(svc, vnetPrefix) || !isWithinCIDR(pe, vnetPrefix)) {
    return { aksSubnet: '', servicesSubnet: '', peSubnet: '' };
  }
  return { aksSubnet: aks, servicesSubnet: svc, peSubnet: pe };
}

// RENDER
// ============================================================

function render() {
  renderStepNav();
  renderCurrentStep();
  updateNavButtons();
}

function renderStepNav() {
  var nav = document.getElementById('stepNav');
  var html = '';
  for (var i = 0; i < STEPS.length; i++) {
    var s = STEPS[i];
    var v = validateStep(s.num);
    var active = s.num === currentStep;
    var dot = '';
    if (v.errors.length > 0) dot = '<span class="w-2 h-2 rounded-full bg-red-500 inline-block ml-2"></span>';
    else if (v.warnings.length > 0) dot = '<span class="w-2 h-2 rounded-full bg-yellow-400 inline-block ml-2"></span>';
    html += '<button onclick="goToStep(' + s.num + ')" class="w-full text-left px-3 py-2 rounded-lg mb-1 text-sm flex items-center justify-between ' +
      (active ? 'bg-blue-100 text-blue-800 font-semibold' : 'text-gray-600 hover:bg-gray-100') + '">' +
      '<span><span class="text-xs text-gray-400 mr-2">' + s.num + '.</span>' + s.title + '</span>' + dot + '</button>';
  }
  nav.innerHTML = html;
}

function renderCurrentStep() {
  var main = document.getElementById('mainContent');
  var html = '';
  switch (currentStep) {
    case 1: html = renderStep1(); break;
    case 2: html = renderStep2(); break;
    case 3: html = renderStep3(); break;
    case 4: html = renderStep4(); break;
    case 5: html = renderStep5(); break;
    case 6: html = renderStep6(); break;
    case 7: html = renderStep7(); break;
  }
  main.innerHTML = html;
}

function updateNavButtons() {
  var btnPrev = document.getElementById('btnPrev');
  var btnNext = document.getElementById('btnNext');
  btnPrev.disabled = currentStep === 1;
  if (currentStep === STEPS.length) {
    btnNext.textContent = 'Generate';
    btnNext.className = 'px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700';
  } else {
    btnNext.textContent = 'Next';
    btnNext.className = 'px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700';
  }
}

var _generated = false;
function nextStep() {
  var v = validateStep(currentStep);
  if (v.errors.length > 0) {
    render();
    return;
  }
  if (currentStep === STEPS.length) {
    generatePackage();
    return;
  }
  if (currentStep < STEPS.length) {
    currentStep++;
    _generated = false;
    render();
    window.scrollTo(0, 0);
  }
}

function generatePackage() {
  var allV = validateAllSteps();
  if (allV.errors.length > 0) {
    render();
    window.scrollTo(0, 0);
    return;
  }
  _generated = true;
  render();
  // Scroll to the download section
  var dlSection = document.getElementById('downloadSection');
  if (dlSection) dlSection.scrollIntoView({ behavior: 'smooth' });
}

function prevStep() {
  if (currentStep > 1) {
    currentStep--;
    render();
    window.scrollTo(0, 0);
  }
}

function goToStep(n) {
  if (n >= 1 && n <= STEPS.length) {
    if (n !== currentStep) _generated = false;
    currentStep = n;
    render();
    window.scrollTo(0, 0);
  }
}

function onVnetChange(value) {
  setValNoRender('vnetAddressPrefix', value);
  var suggestions = suggestSubnets(value);
  if (suggestions.aksSubnet && !state.aksSubnetPrefix._edited) {
    setValNoRender('aksSubnetPrefix', suggestions.aksSubnet);
  }
  if (suggestions.servicesSubnet && !state.servicesSubnetPrefix._edited) {
    setValNoRender('servicesSubnetPrefix', suggestions.servicesSubnet);
  }
  if (suggestions.peSubnet && !state.privateEndpointSubnetPrefix._edited) {
    setValNoRender('privateEndpointSubnetPrefix', suggestions.peSubnet);
  }
  autoSave();
  // Debounced focus-preserving render to update subnet suggestions
  if (_renderTimer) clearTimeout(_renderTimer);
  _renderTimer = setTimeout(function() { _renderTimer = null; renderPreservingFocus(); }, 400);
}

function renderMultiInput(key, values, placeholder) {
  var inputSmCls = 'flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500';
  var btnDangerCls = 'px-2 py-1.5 text-xs border border-red-300 text-red-600 rounded hover:bg-red-50 flex-shrink-0';
  var btnAddCls = 'mt-2 px-3 py-1.5 text-xs border border-blue-300 text-blue-600 rounded hover:bg-blue-50';
  var arr = values || [];
  if (arr.length === 0) arr = [''];
  var html = '';
  for (var i = 0; i < arr.length; i++) {
    html +=
      '<div class="flex gap-2 mb-2">' +
        '<input type="text" value="' + escapeHtml(arr[i]) + '" placeholder="' + escapeHtml(placeholder) + '"' +
          ' oninput="updateArrayItem(\'' + key + '\',' + i + ',this.value)"' +
          ' class="' + inputSmCls + ' font-mono">' +
        '<button onclick="removeArrayItem(\'' + key + '\',' + i + ')" class="' + btnDangerCls + '" title="Remove">&#x2715;</button>' +
      '</div>';
  }
  html += '<button onclick="addArrayItem(\'' + key + '\')" class="' + btnAddCls + '">+ Add IP Range</button>';
  return html;
}

function renderSubnetVisual(s) {
  var vnet = s.vnetAddressPrefix;
  var aksCidr = s.aksSubnetPrefix;
  var svcCidr = s.servicesSubnetPrefix;
  var peCidr = s.privateEndpointSubnetPrefix;

  var vnetCap = cidrCapacity(vnet);
  var aksCap = cidrCapacity(aksCidr);
  var svcCap = cidrCapacity(svcCidr);
  var peCap = cidrCapacity(peCidr);

  if (!parseCIDR(vnet) || vnetCap === 0) {
    return '<div class="text-xs text-gray-400 italic">Enter a valid VNet CIDR to see subnet layout.</div>';
  }

  // Calculate percentages for bar
  var aksValid = parseCIDR(aksCidr) && isWithinCIDR(aksCidr, vnet);
  var svcValid = parseCIDR(svcCidr) && isWithinCIDR(svcCidr, vnet);
  var peValid = parseCIDR(peCidr) && isWithinCIDR(peCidr, vnet);

  var aksCount = aksValid ? aksCap : 0;
  var svcCount = svcValid ? svcCap : 0;
  var peCount = peValid ? peCap : 0;
  var usedCount = aksCount + svcCount + peCount;
  var freeCount = vnetCap - usedCount;
  if (freeCount < 0) freeCount = 0;

  var aksPct = vnetCap > 0 ? (aksCount / vnetCap * 100).toFixed(1) : 0;
  var svcPct = vnetCap > 0 ? (svcCount / vnetCap * 100).toFixed(1) : 0;
  var pePct = vnetCap > 0 ? (peCount / vnetCap * 100).toFixed(1) : 0;
  var freePct = vnetCap > 0 ? (freeCount / vnetCap * 100).toFixed(1) : 0;

  var barHtml = '<div class="flex rounded overflow-hidden h-6 text-xs font-medium">';
  if (aksCount > 0) {
    barHtml += '<div class="bg-blue-500 text-white flex items-center justify-center overflow-hidden" style="width:' + aksPct + '%">' +
      (parseFloat(aksPct) > 8 ? 'AKS' : '') + '</div>';
  }
  if (svcCount > 0) {
    barHtml += '<div class="bg-green-500 text-white flex items-center justify-center overflow-hidden" style="width:' + svcPct + '%">' +
      (parseFloat(svcPct) > 8 ? 'Svc' : '') + '</div>';
  }
  if (peCount > 0) {
    barHtml += '<div class="bg-purple-500 text-white flex items-center justify-center overflow-hidden" style="width:' + pePct + '%">' +
      (parseFloat(pePct) > 8 ? 'PE' : '') + '</div>';
  }
  if (freeCount > 0) {
    barHtml += '<div class="bg-gray-200 text-gray-500 flex items-center justify-center overflow-hidden" style="width:' + freePct + '%">' +
      (parseFloat(freePct) > 8 ? 'Free' : '') + '</div>';
  }
  barHtml += '</div>';

  var legendHtml = '<div class="flex flex-wrap gap-4 mt-2 text-xs text-gray-600">' +
    (aksCount > 0 ? '<span class="flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-sm bg-blue-500"></span>AKS: ' + aksCount.toLocaleString() + ' IPs (' + aksCidr + ')</span>' : '') +
    (svcCount > 0 ? '<span class="flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-sm bg-green-500"></span>Services: ' + svcCount.toLocaleString() + ' IPs (' + svcCidr + ')</span>' : '') +
    (peCount > 0 ? '<span class="flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-sm bg-purple-500"></span>PE: ' + peCount.toLocaleString() + ' IPs (' + peCidr + ')</span>' : '') +
    (freeCount > 0 ? '<span class="flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-sm bg-gray-300"></span>Free: ' + freeCount.toLocaleString() + ' IPs</span>' : '') +
    '</div>' +
    '<p class="text-xs text-gray-400 mt-1">VNet total: ' + vnetCap.toLocaleString() + ' IPs (' + vnet + ')</p>';

  return barHtml + legendHtml;
}

function renderToolGuidancePreview(tool, s) {

  var rgName = 'rg-' + (s.customerName || '{name}') + '-' + (s.environment || '{env}') + '-' + (s.location || '{region}');
  var aksName = 'aks-' + (s.customerName || '{name}') + '-' + (s.environment || '{env}');

  function subVars(cmd) {
    return cmd.replace(/\{rgName\}/g, rgName).replace(/\{aksName\}/g, aksName)
              .replace(/<rg>/g, rgName).replace(/<aks>/g, aksName);

    for (var ci = 0; ci < g.commands.length; ci++) {
      linesHtml += '<div class="font-mono text-xs text-green-300 mb-1 break-all">' + escapeHtml(subVars(g.commands[ci])) + '</div>';

    '<summary class="text-xs text-blue-600 cursor-pointer hover:text-blue-800 select-none font-medium">Show guidance preview</summary>' +
    '<div class="mt-2 bg-gray-800 rounded-lg p-3">' +

  html += '<div class="border border-blue-200 rounded-lg p-3 mb-2 bg-blue-50">' +
    '<div class="text-xs font-semibold text-blue-700 mb-2">VNet: ' + escapeHtml(vnetName) + ' (' + escapeHtml(s.vnetAddressPrefix || '?') + ')</div>' +
    '<div class="grid grid-cols-1 md:grid-cols-3 gap-2">' +
    item('AKS Subnet: ' + (s.aksSubnetPrefix || '?'), true) +
    item('Services Subnet: ' + (s.servicesSubnetPrefix || '?'), true) +
    item('PE Subnet: ' + (s.privateEndpointSubnetPrefix || '?'), s.enablePrivateCluster) +
    '</div></div>';

  // AKS cluster
  var sysCount = s.systemAutoscaling ? s.systemNodeMinCount + '-' + s.systemNodeMaxCount : s.systemNodeCount;
  var userCount = s.userAutoscaling ? s.userNodeMinCount + '-' + s.userNodeMaxCount : s.userNodeCount;
  html += '<div class="border border-purple-200 rounded-lg p-3 mb-2 bg-purple-50">' +
    '<div class="text-xs font-semibold text-purple-700 mb-2">AKS: ' + escapeHtml(aksName) + ' (v' + escapeHtml(s.kubernetesVersion || '?') + ')</div>' +
    '<div class="grid grid-cols-1 md:grid-cols-2 gap-2">' +
    item('System Pool: ' + sysCount + ' x ' + (s.systemNodeVmSize || '?'), true) +
    item('User Pool: ' + userCount + ' x ' + (s.userNodeVmSize || '?'), true) +
    '</div></div>';

  // Platform services
  html += '<div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-2">' +
    item('ACR: ' + acrName + ' (' + (s.acrSku || 'Standard') + ')', s.deployAcr) +
    item('Key Vault (' + (s.keyVaultSku || 'standard') + ')', s.deployKeyVault) +
    item('Monitoring (retention: ' + (s.logRetentionDays || 30) + 'd)', s.deployMonitoring) +
    '</div>';

  // Ecosystem tools
  if (selectedTools.length > 0) {
    html += '<div class="border border-orange-200 rounded-lg p-3 bg-orange-50">' +
      '<div class="text-xs font-semibold text-orange-700 mb-2">Ecosystem Tools</div>' +
      '<div class="flex flex-wrap gap-2">';
    for (var i = 0; i < selectedTools.length; i++) {
      html += item(selectedTools[i], true);
    }
    html += '</div></div>';
  }

  html += '</div>'; // end resource group
  html += '</div></div>'; // end font-mono, end card

  return html;
}

// ============================================================
// GENERATORS
// ============================================================

function bicepString(value) {
  if (value === null || value === undefined) return "''";
  var str = String(value);
  str = str.replace(/'/g, "''");
  return "'" + str + "'";
}

function bicepStringArray(arr, indent) {
  var pad = indent || '    ';
  var list = (arr || [])
    .filter(function(v) { return v !== null && v !== undefined && String(v).trim() !== ''; })
    .map(function(v) { return String(v).trim(); });
  if (list.length === 0) return '[]';
  return '[\n' + list.map(function(v) { return pad + bicepString(v); }).join('\n') + '\n  ]';
}

function generateBicepParam(s) {
  var lines = [];
  lines.push("using 'main.bicep'");
  lines.push('');
  lines.push('param customerName = ' + bicepString(s.customerName || ''));
  lines.push('param environment = ' + bicepString(s.environment || 'dev'));
  lines.push('param location = ' + bicepString(s.location || 'westeurope'));
  lines.push('');

  // Tags
  lines.push('param tags = {');
  lines.push('  CostCenter: ' + bicepString(s.tagCostCenter || ''));
  lines.push('  Owner: ' + bicepString(s.tagOwner || ''));
  lines.push('  Project: ' + bicepString(s.tagProject || ''));
  var customTags = s.customTags || [];
  for (var i = 0; i < customTags.length; i++) {
    var ct = customTags[i];
    if (ct.key && ct.key.trim()) {
      var tagKey = ct.key.trim();
      // Quote tag key if it contains non-identifier characters
      if (/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(tagKey)) {
        lines.push('  ' + tagKey + ': ' + bicepString(ct.value || ''));
      } else {
        lines.push('  ' + bicepString(tagKey) + ': ' + bicepString(ct.value || ''));
      }
    }
  }
  lines.push('}');
  lines.push('');

  // Features
  lines.push('param features = {');
  lines.push('  deployAcr: ' + (s.deployAcr ? 'true' : 'false'));
  lines.push('  deployKeyVault: ' + (s.deployKeyVault ? 'true' : 'false'));
  lines.push('  deployMonitoring: ' + (s.deployMonitoring ? 'true' : 'false'));
  lines.push('}');
  lines.push('');

  // Network config
  lines.push('param networkConfig = {');
  lines.push('  vnetAddressPrefix: ' + bicepString(s.vnetAddressPrefix || ''));
  lines.push('  aksSubnetPrefix: ' + bicepString(s.aksSubnetPrefix || ''));
  lines.push('  servicesSubnetPrefix: ' + bicepString(s.servicesSubnetPrefix || ''));
  lines.push('  privateEndpointSubnetPrefix: ' + bicepString(s.privateEndpointSubnetPrefix || ''));
  lines.push('}');
  lines.push('');

  // AKS config
  var sysMinCount = s.systemNodeMinCount || 1;
  var sysMaxCount = s.systemNodeMaxCount || Math.max(sysMinCount + 2, 3);
  var sysStart = s.systemAutoscaling ? sysMinCount : (s.systemNodeCount || 1);
  var usrMinCount = s.userNodeMinCount || 1;
  var usrMaxCount = s.userNodeMaxCount || Math.max(usrMinCount * 3, 5);
  var usrStart = s.userAutoscaling ? usrMinCount : (s.userNodeCount || 1);

  var zones = Array.isArray(s.availabilityZones) ? s.availabilityZones : [];
  var authIPs = Array.isArray(s.apiServerAuthorizedIPs) ? s.apiServerAuthorizedIPs : [];

  lines.push('param aksConfig = {');
  lines.push('  kubernetesVersion: ' + bicepString(s.kubernetesVersion || '1.35'));
  lines.push('  systemNodeCount: ' + sysStart);
  lines.push('  systemNodeVmSize: ' + bicepString(s.systemNodeVmSize || 'Standard_D4s_v5'));
  lines.push('  systemNodeMinCount: ' + sysMinCount);
  lines.push('  systemNodeMaxCount: ' + sysMaxCount);
  lines.push('  userNodeCount: ' + usrStart);
  lines.push('  userNodeVmSize: ' + bicepString(s.userNodeVmSize || 'Standard_D8s_v5'));
  lines.push('  userNodeMinCount: ' + usrMinCount);
  lines.push('  userNodeMaxCount: ' + usrMaxCount);
  lines.push('  enablePrivateCluster: ' + (s.enablePrivateCluster ? 'true' : 'false'));
  lines.push('  availabilityZones: ' + bicepStringArray(zones));
  lines.push('  apiServerAuthorizedIPRanges: ' + bicepStringArray(authIPs));
  lines.push('  skuTier: ' + bicepString(s.skuTier || (s.environment === 'dev' ? 'Free' : 'Standard')));
  lines.push('  upgradeChannel: ' + bicepString(s.upgradeChannel || 'patch'));
  lines.push('  nodeOSUpgradeChannel: ' + bicepString(s.nodeOSUpgradeChannel || 'NodeImage'));
  lines.push('  osDiskType: ' + bicepString(s.osDiskType || 'Ephemeral'));
  lines.push('  osDiskSizeGB: ' + (s.osDiskSizeGB || 30));
  lines.push('  maxPodsPerNode: ' + (s.maxPodsPerNode || 50));
  if (s.environment === 'prod' || s.environment === 'acc') {
    lines.push('  natGatewayOutboundIpCount: 2');
  }
  lines.push('}');
  lines.push('');

  // Admin group object IDs
  var ids = s.adminGroupObjectIds || [];
  var validIds = [];
  for (var i = 0; i < ids.length; i++) {
    var id = (ids[i] || '').trim();
    if (id) validIds.push(id);
  }
  lines.push('param adminGroupObjectIds = [');
  for (var i = 0; i < validIds.length; i++) {
    lines.push('  ' + bicepString(validIds[i]));
  }
  lines.push(']');
  lines.push('');

  // ACR SKU
  lines.push('param acrSku = ' + bicepString(s.acrSku || 'Standard'));

  // Key Vault SKU
  lines.push('param keyVaultSku = ' + bicepString(s.keyVaultSku || 'standard'));

  // Log retention
  lines.push('param logRetentionDays = ' + (s.logRetentionDays || 30));

  // Additional role assignments (only if non-empty)
  var roles = s.additionalRoleAssignments || [];
  var validRoles = [];
  for (var i = 0; i < roles.length; i++) {
    var r = roles[i];
    if (r.principalId && r.principalId.trim() && r.roleDefinitionId && r.roleDefinitionId.trim()) {
      validRoles.push(r);
    }
  }
  if (validRoles.length > 0) {
    lines.push('');
    lines.push('param additionalRoleAssignments = [');
    for (var i = 0; i < validRoles.length; i++) {
      var vr = validRoles[i];
      lines.push('  {');
      lines.push('    principalId: ' + bicepString(vr.principalId.trim()));
      lines.push('    roleDefinitionId: ' + bicepString(vr.roleDefinitionId.trim()));
      lines.push('    principalType: ' + bicepString(vr.principalType || 'ServicePrincipal'));
      lines.push('  }');
    }
    lines.push(']');
  }

  return lines.join('\n') + '\n';
}

function generateDeploymentGuide(s) {
  var rgName = 'rg-' + (s.customerName || '{name}') + '-' + (s.environment || '{env}') + '-' + (s.location || '{region}');
  var aksName = 'aks-' + (s.customerName || '{name}') + '-' + (s.environment || '{env}');
  var env = s.environment || 'dev';
  var region = s.location || 'westeurope';

  var lines = [];
  lines.push('# AKS Deployment Guide');
  lines.push('');
  lines.push('- **Environment:** ' + env);
  lines.push('- **Region:** ' + region);
  lines.push('- **Cluster type:** ' + (s.enablePrivateCluster ? 'Private' : 'Public'));
  lines.push('');

  // Breaking-change notice (v1.3 defaults)
  lines.push('## Important: Cluster Recreation Required for Existing Deployments');
  lines.push('');
  lines.push('This generated Bicep uses Cilium dataplane (Azure CNI Overlay) and user-assigned NAT Gateway outbound.');
  lines.push('These are **create-time** properties on AKS — you cannot switch an existing cluster to them via `az aks update`.');
  lines.push('If you are re-deploying over an existing cluster that used Azure CNI classic + Load Balancer outbound, the deployment will fail.');
  lines.push('');
  lines.push('Options:');
  lines.push('- **New cluster:** deploy as-is, you get Cilium + NAT Gateway out of the box.');
  lines.push('- **Existing cluster:** either delete first (blue/green), or edit `modules/aks/aksCluster.bicep` to match your current network profile before running.');
  lines.push('');
  lines.push('Legacy properties to restore for compatibility:');
  lines.push("- `networkPluginMode: 'overlay'` → remove");
  lines.push("- `networkDataplane: 'cilium'` → remove");
  lines.push("- `networkPolicy: 'cilium'` → `'azure'`");
  lines.push("- `outboundType: 'userAssignedNATGateway'` → `'loadBalancer'`");
  lines.push('- remove the NAT gateway module and VNet natGatewayId param');
  lines.push('');

  // Prerequisites
  lines.push('## Prerequisites');
  lines.push('');
  lines.push('- Azure CLI installed (`az --version`)');
  lines.push('- Bicep CLI installed (`az bicep version`)');
  lines.push('- Sufficient permissions to create resources at subscription scope');
  lines.push('- `kubectl` installed for cluster management');
  if (s.enablePrivateCluster) {
    lines.push('- VPN or private network access to the VNet (private cluster)');
  }
  lines.push('');

  // Deploy command
  lines.push('## Deploy');
  lines.push('');
  lines.push('```bash');
  lines.push('az deployment sub create \\');
  lines.push('  --location ' + region + ' \\');
  lines.push('  --template-file infra/main.bicep \\');
  lines.push('  --parameters infra/main.' + env + '.bicepparam');
  lines.push('```');
  lines.push('');

  // Connect
  lines.push('## Connect to Cluster');
  lines.push('');
  lines.push('```bash');
  lines.push('az aks get-credentials --resource-group ' + rgName + ' --name ' + aksName);
  lines.push('```');
  lines.push('');

  // Authorized IPs — emitted to Bicep (apiServerAccessProfile.authorizedIPRanges).
  // Surface a reference note for updating ranges post-deploy without a redeploy.
  var authIPs = s.apiServerAuthorizedIPs || [];
  var validIPs = [];
  for (var i = 0; i < authIPs.length; i++) {
    var ip = (authIPs[i] || '').trim();
    if (ip) validIPs.push(ip);
  }
  if (!s.enablePrivateCluster && validIPs.length > 0) {
    lines.push('## API Server Authorized IP Ranges');
    lines.push('');
    lines.push('Configured via Bicep (apiServerAccessProfile.authorizedIPRanges): ' + validIPs.join(', '));
    lines.push('');
    lines.push('To add or rotate ranges without a redeploy:');
    lines.push('');
    lines.push('```bash');
    lines.push('az aks update \\');
    lines.push('  --resource-group ' + rgName + ' \\');
    lines.push('  --name ' + aksName + ' \\');
    lines.push('  --api-server-authorized-ip-ranges ' + validIPs.join(','));
    lines.push('```');
    lines.push('');
  }

  // Upgrade channel
  var upgradeChannel = s.upgradeChannel || 'none';
  if (upgradeChannel !== 'none') {
    lines.push('## Configure Upgrade Channel');
    lines.push('');
    lines.push('```bash');
    lines.push('az aks update \\');
    lines.push('  --resource-group ' + rgName + ' \\');
    lines.push('  --name ' + aksName + ' \\');
    lines.push('  --auto-upgrade-channel ' + upgradeChannel);
    lines.push('```');
    lines.push('');
  }

  // Availability zones guidance
  var azZones = s.availabilityZones || [];
  if (azZones.length > 0) {
    lines.push('## Availability Zones');
    lines.push('');
    lines.push('This cluster is configured with availability zones: ' + azZones.join(', ') + '.');
    lines.push('Ensure your persistent volumes use zone-redundant storage (ZRS) for cross-zone resilience.');
    lines.push('');
  }

  // Ecosystem tools
  var tools = s.ecosystemTools || {};
  var catKeys = Object.keys(ECOSYSTEM_TOOLS);
  var hasToolSection = false;
  for (var ci = 0; ci < catKeys.length; ci++) {
    var catTools = ECOSYSTEM_TOOLS[catKeys[ci]].tools;
    for (var ti = 0; ti < catTools.length; ti++) {
      var tool = catTools[ti];
      if (!tools[tool.id]) continue;
      if (!hasToolSection) {
        lines.push('## Ecosystem Tools');
        lines.push('');
        hasToolSection = true;
      }
      var g = tool.guidance;

      lines.push('### ' + tool.label);
      lines.push('');
      lines.push(tool.description);
      lines.push('');

      if (g && g.commands && g.commands.length) {
        lines.push('```bash');
        for (var ci2 = 0; ci2 < g.commands.length; ci2++) {
          var cmd = g.commands[ci2]
            .replace(/<rg>/g, rgName).replace(/<aks>/g, aksName)
            .replace(/\{rgName\}/g, rgName).replace(/\{aksName\}/g, aksName);
          lines.push(cmd);
        }
        lines.push('```');
        lines.push('');
      }

      if (g && g.verifyCmd) {
        var verifyCmd = g.verifyCmd
          .replace(/<rg>/g, rgName).replace(/<aks>/g, aksName)
          .replace(/\{rgName\}/g, rgName).replace(/\{aksName\}/g, aksName);
        lines.push('Verify:');
        lines.push('');
        lines.push('```bash');
        lines.push(verifyCmd);
        lines.push('```');
        lines.push('');
      }

      if (g && g.note) {
        lines.push('> ' + g.note);
        lines.push('');
      }

      lines.push('*Starter commands -- review values for production use.*');
      lines.push('');
    }
  }

  // Validation checklist
  lines.push('## Validation Checklist');
  lines.push('');
  lines.push('- [ ] Deployment completed without errors');
  lines.push('- [ ] `kubectl get nodes` shows all nodes Ready');
  lines.push('- [ ] Cluster RBAC verified with admin group');
  if (s.deployAcr) lines.push('- [ ] ACR accessible from AKS cluster');
  if (s.deployKeyVault) lines.push('- [ ] Key Vault accessible and secrets mounted');
  if (s.deployMonitoring) lines.push('- [ ] Monitoring and logging operational');
  if (s.enablePrivateCluster) lines.push('- [ ] Private endpoint connectivity verified');
  lines.push('- [ ] Network policies tested');
  lines.push('- [ ] Workload identity functioning');
  lines.push('');

  return lines.join('\n');
}

// ============================================================

function downloadAllZip() {
  if (typeof JSZip === 'undefined') {
    showBanner('ZIP download unavailable — JSZip library failed to load. Try individual downloads instead.');
    return;
  }
  var s = getFlatState();
  var env = s.environment || 'dev';
  var customerName = s.customerName || 'unnamed';
  var zip = new JSZip();

  // Add all Bicep template files under infra/
  var templateKeys = Object.keys(BICEP_TEMPLATES);
  for (var i = 0; i < templateKeys.length; i++) {
    zip.file('infra/' + templateKeys[i], BICEP_TEMPLATES[templateKeys[i]]);
  }

  // Add the generated .bicepparam file
  var bicepParamFilename = 'main.' + env + '.bicepparam';
  zip.file('infra/' + bicepParamFilename, generateBicepParam(s));

  // Add the deployment guide
  zip.file('deployment-guide.md', generateDeploymentGuide(s));

  // Generate and download
  zip.generateAsync({ type: 'blob' }).then(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'aks-deployment-' + customerName + '-' + env + '.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 100);
  }).catch(function(err) {
    console.error('Failed to generate ZIP', err);
    showBanner('Failed to generate ZIP package. Try individual downloads instead.');
  });
}

function downloadFile(filename, content) {
  var blob = new Blob([content], { type: 'text/plain' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 100);
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showCopyFeedback('Copied to clipboard');
    }).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showCopyFeedback('Copied to clipboard');
  } catch (e) {
    showCopyFeedback('Copy failed');
  }
  document.body.removeChild(ta);
}

function showCopyFeedback(msg) {
  var el = document.getElementById('saveStatus');
  if (el) {
    el.textContent = msg;
    el.className = 'text-xs text-green-600 absolute right-4 bottom-1';
    setTimeout(function() {
      el.textContent = 'Auto-saved';
      el.className = 'text-xs text-gray-400 absolute right-4 bottom-1';
    }, 2000);
  }
}

// ============================================================
// PERSISTENCE
// ============================================================

var STORAGE_KEY = 'aksConfigurator_state';
var STORAGE_STEP_KEY = 'aksConfigurator_step';

function autoSave() {
  try {
    var stateData = {};
    var keys = Object.keys(state);
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      stateData[k] = { value: state[k].value, _edited: state[k]._edited };
    }
    var data = { schemaVersion: SCHEMA_VERSION, state: stateData };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    localStorage.setItem(STORAGE_STEP_KEY, String(currentStep));
    var el = document.getElementById('saveStatus');
    if (el) {
      el.textContent = 'Auto-saved';
      el.className = 'text-xs text-gray-400 absolute right-4 bottom-1';
    }
  } catch (e) {
    var el = document.getElementById('saveStatus');
    if (el) {
      el.textContent = 'Save failed';
      el.className = 'text-xs text-red-400 absolute right-4 bottom-1';
    }
  }
}

function autoRestore() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    var stored = JSON.parse(raw);
    if (!stored || typeof stored !== 'object') return false;
    // Skip restore if schema version doesn't match
    if (stored.schemaVersion !== SCHEMA_VERSION) return false;
    var data = stored.state;
    if (!data || typeof data !== 'object' || !data.environment) return false;
    state = {};
    var keys = Object.keys(data);
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      var val = data[k].value;
      if (Array.isArray(val)) val = val.slice();
      else if (typeof val === 'object' && val !== null) val = Object.assign({}, val);
      state[k] = { value: val, _edited: !!data[k]._edited };
    }
    var savedStep = localStorage.getItem(STORAGE_STEP_KEY);
    if (savedStep) {
      var n = parseInt(savedStep, 10);
      if (n >= 1 && n <= STEPS.length) currentStep = n;
    }
    // Soft migration: earlier versions shipped with placeholder GUIDs.
    // Clear them so the user is forced to enter a real Entra ID group GUID.
    var adminState = state.adminGroupObjectIds;
    if (adminState && Array.isArray(adminState.value)) {
      var placeholders = ['00000000-0000-0000-0000-000000000000', '11111111-1111-1111-1111-111111111111'];
      var onlyPlaceholdersOrEmpty = adminState.value.length === 0 || adminState.value.every(function(v) {
        var t = (v || '').trim().toLowerCase();
        return t === '' || placeholders.indexOf(t) !== -1;
      });
      if (onlyPlaceholdersOrEmpty) {
        adminState.value = [''];
        adminState._edited = false;
        // Persist the migrated value so the next auto-save doesn't restore
        // the old placeholder.
        try { autoSave(); } catch (e2) { /* ignore */ }
      }
    }
    return true;
  } catch (e) {
    return false;
  }
}

function resetState() {
  if (!confirm('Reset all configuration to defaults? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_STEP_KEY);
  currentStep = 1;
  initState('dev');
  render();
}

function saveConfig() {
  var stateData = {};
  var keys = Object.keys(state);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    stateData[k] = { value: state[k].value, _edited: state[k]._edited };
  }
  var export_ = {
    schemaVersion: SCHEMA_VERSION,
    toolVersion: '1.0',
    exportedAt: new Date().toISOString(),
    state: stateData
  };
  var filename = 'aks-config-' + (getVal('customerName') || 'unnamed') + '-' + (getVal('environment') || 'dev') + '.json';
  downloadFile(filename, JSON.stringify(export_, null, 2));
}

function loadConfig() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var parsed = JSON.parse(ev.target.result);
        var stateData;
        var versionMismatch = false;

        if (parsed && parsed.schemaVersion !== undefined && parsed.state && typeof parsed.state === 'object' && !Array.isArray(parsed.state)) {
          // Versioned format
          if (parsed.schemaVersion !== SCHEMA_VERSION) {
            versionMismatch = true;
          }
          stateData = parsed.state;
        } else {
          // Legacy flat format — treat as version mismatch but still load
          versionMismatch = true;
          stateData = parsed;
        }

        var envVal = stateData.environment && stateData.environment.value !== undefined
          ? stateData.environment.value
          : (stateData.environment || 'dev');
        initState(envVal);

        var keys = Object.keys(stateData);
        for (var i = 0; i < keys.length; i++) {
          var k = keys[i];
          if (state[k] !== undefined) {
            var entry = stateData[k];
            if (entry && typeof entry === 'object' && entry.value !== undefined) {
              state[k].value = entry.value;
              state[k]._edited = !!entry._edited;
            } else {
              state[k].value = entry;
              state[k]._edited = true;
            }
          }
        }

        autoSave();
        render();

        var banner = document.getElementById('envBanner');
        if (versionMismatch) {
          banner.textContent = 'Warning: loaded config schema version does not match current tool version. Some settings may not have been restored correctly.';
          banner.className = 'bg-red-100 border-b border-red-300 text-red-800 text-center py-2 text-sm font-medium';
        } else {
          banner.textContent = 'Configuration loaded successfully.';
          banner.className = 'bg-green-100 border-b border-green-300 text-green-800 text-center py-2 text-sm font-medium';
        }
        setTimeout(function() { banner.classList.add('fade-out'); }, 2500);
        setTimeout(function() { banner.className = 'hidden'; }, 3000);
      } catch (err) {
        alert('Failed to load configuration: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ============================================================
// INIT
// ============================================================

// Test hook: exposes the const-scoped constants + selected functions for
// headless CI. Browsers don't attach `const` declarations to `window`, so
// this is the explicit bridge used by tools/test/generate-package.mjs.
// Assigned BEFORE init() runs so it is available even if DOM rendering
// throws under jsdom. Safe to expose — everything is already in view-source.
window.__TEST__ = {
  ENV_DEFAULTS: ENV_DEFAULTS,
  BICEP_TEMPLATES: BICEP_TEMPLATES,
  VM_SIZES: VM_SIZES,
  generateBicepParam: generateBicepParam,
  generateDeploymentGuide: generateDeploymentGuide,
  SCHEMA_VERSION: SCHEMA_VERSION
};

(function init() {
  if (!autoRestore()) {
    initState('dev');
  }
  render();
})();
</script>
