// ============================================================
// STATE
// ============================================================

var state = {};
var currentStep = 1;

function initState(env) {
  var defaults = ENV_DEFAULTS[env] || ENV_DEFAULTS.dev;
  state = {};
  var fields = [
    'customerName', 'environment', 'location', 'enablePrivateCluster', 'kubernetesVersion',
    'adminGroupObjectIds', 'tagCostCenter', 'tagOwner', 'tagProject', 'customTags',
    'additionalRoleAssignments', 'vnetAddressPrefix', 'aksSubnetPrefix', 'servicesSubnetPrefix',
    'privateEndpointSubnetPrefix', 'serviceCidr', 'dnsServiceIP', 'apiServerAuthorizedIPs',
    'systemNodeVmSize', 'systemAutoscaling', 'systemNodeCount', 'systemNodeMinCount',
    'systemNodeMaxCount', 'userNodeVmSize', 'userAutoscaling', 'userNodeCount',
    'userNodeMinCount', 'userNodeMaxCount', 'osDiskSizeGB', 'availabilityZones',
    'upgradeChannel', 'maxPodsPerNode', 'deployAcr', 'acrSku', 'deployKeyVault',
    'keyVaultSku', 'deployMonitoring', 'logRetentionDays', 'ecosystemTools'
  ];

  for (var i = 0; i < fields.length; i++) {
    var f = fields[i];
    var val = defaults[f];
    if (val === undefined) {
      if (f === 'customerName') val = '';
      else if (f === 'adminGroupObjectIds') val = [];
      else if (f === 'customTags') val = [];
      else if (f === 'additionalRoleAssignments') val = [];
      else if (f === 'apiServerAuthorizedIPs') val = [];
      else if (f === 'ecosystemTools') val = {};
      else val = '';
    }
    if (Array.isArray(val)) val = val.slice();
    else if (typeof val === 'object' && val !== null) val = Object.assign({}, val);
    state[f] = { value: val, _edited: false };
  }
}

function getVal(key) {
  return state[key] ? state[key].value : undefined;
}

function setVal(key, value) {
  if (!state[key]) state[key] = { value: null, _edited: false };
  if (Array.isArray(value)) value = value.slice();
  else if (typeof value === 'object' && value !== null) value = Object.assign({}, value);
  state[key].value = value;
  state[key]._edited = true;
  autoSave();
  render();
}

function setValNoRender(key, value) {
  if (!state[key]) state[key] = { value: null, _edited: false };
  if (Array.isArray(value)) value = value.slice();
  else if (typeof value === 'object' && value !== null) value = Object.assign({}, value);
  state[key].value = value;
  state[key]._edited = true;
}

function switchEnvironment(newEnv) {
  var defaults = ENV_DEFAULTS[newEnv];
  if (!defaults) return;

  var updatedCount = 0;
  var keys = Object.keys(defaults);
  for (var i = 0; i < keys.length; i++) {
    var key = keys[i];
    if (state[key] && !state[key]._edited) {
      var val = defaults[key];
      if (Array.isArray(val)) val = val.slice();
      else if (typeof val === 'object' && val !== null) val = Object.assign({}, val);
      state[key].value = val;
      updatedCount++;
    }
  }
  state.environment.value = newEnv;
  state.environment._edited = true;

  var banner = document.getElementById('envBanner');
  banner.textContent = 'Switched to ' + newEnv.toUpperCase() + ' environment. ' + updatedCount + ' fields updated to ' + newEnv + ' defaults (user-edited fields preserved).';
  banner.className = 'bg-amber-100 border-b border-amber-300 text-amber-800 text-center py-2 text-sm font-medium';
  setTimeout(function() { banner.classList.add('fade-out'); }, 2500);
  setTimeout(function() { banner.classList.add('hidden'); }, 3000);

  autoSave();
  render();
}

function getFlatState() {
  var flat = {};
  var keys = Object.keys(state);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var val = state[k].value;
    if (Array.isArray(val)) val = val.slice();
    else if (typeof val === 'object' && val !== null) val = Object.assign({}, val);
    flat[k] = val;
  }
  return flat;
}

function getVmVcpu(vmSize) {
  for (var i = 0; i < VM_SIZES.length; i++) {
    if (VM_SIZES[i].name === vmSize) return VM_SIZES[i].vCPU;
  }
  return 2;
}

// ============================================================
// VALIDATION
// ============================================================

function validateStep(stepNum) {
  var result = { errors: [], warnings: [], infos: [] };
  if (stepNum === 1) {
    var name = getVal('customerName') || '';
    if (!name) {
      result.errors.push('Customer name is required.');
    } else {
      if (!/^[a-zA-Z0-9-]+$/.test(name)) {
        result.errors.push('Customer name must contain only alphanumeric characters and hyphens.');
      }
      if (name.length > 15) {
        result.errors.push('Customer name must be 15 characters or less.');
      }
    }
    if (!getVal('location')) {
      result.errors.push('Region is required.');
    }
  }
  return result;
}

function validateAllSteps() {
  var all = { errors: [], warnings: [], infos: [] };
  for (var i = 1; i <= STEPS.length; i++) {
    var r = validateStep(i);
    for (var j = 0; j < r.errors.length; j++) all.errors.push('Step ' + i + ': ' + r.errors[j]);
    for (var j = 0; j < r.warnings.length; j++) all.warnings.push('Step ' + i + ': ' + r.warnings[j]);
    for (var j = 0; j < r.infos.length; j++) all.infos.push('Step ' + i + ': ' + r.infos[j]);
  }
  return all;
}

// ============================================================
// CIDR_UTILS
// ============================================================

function parseCIDR(cidr) {
  if (!cidr || typeof cidr !== 'string') return null;
  var m = cidr.match(/^(\d+)\.(\d+)\.(\d+)\.(\d+)\/(\d+)$/);
  if (!m) return null;
  var parts = [+m[1], +m[2], +m[3], +m[4]];
  var prefix = +m[5];
  for (var i = 0; i < parts.length; i++) {
    if (parts[i] < 0 || parts[i] > 255) return null;
  }
  if (prefix < 0 || prefix > 32) return null;
  var ip = ((parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]) >>> 0;
  return { ip: ip, prefix: prefix };
}

function cidrCapacity(cidr) {
  var p = parseCIDR(cidr);
  if (!p) return 0;
  if (p.prefix >= 31) return p.prefix === 32 ? 1 : 2;
  return Math.pow(2, 32 - p.prefix) - 2;
}

function cidrRange(cidr) {
  var p = parseCIDR(cidr);
  if (!p) return null;
  var mask = p.prefix === 0 ? 0 : (0xFFFFFFFF << (32 - p.prefix)) >>> 0;
  var start = (p.ip & mask) >>> 0;
  var end = (start | (~mask >>> 0)) >>> 0;
  return { start: start, end: end };
}

function isWithinCIDR(inner, outer) {
  var ri = cidrRange(inner);
  var ro = cidrRange(outer);
  if (!ri || !ro) return false;
  return ri.start >= ro.start && ri.end <= ro.end;
}

function cidrsOverlap(a, b) {
  var ra = cidrRange(a);
  var rb = cidrRange(b);
  if (!ra || !rb) return false;
  return ra.start <= rb.end && rb.start <= ra.end;
}

function isIPInCIDR(ip, cidr) {
  var m = ip.match(/^(\d+)\.(\d+)\.(\d+)\.(\d+)$/);
  if (!m) return false;
  if (+m[1] > 255 || +m[2] > 255 || +m[3] > 255 || +m[4] > 255) return false;
  var ipNum = ((+m[1] << 24) | (+m[2] << 16) | (+m[3] << 8) | +m[4]) >>> 0;
  var r = cidrRange(cidr);
  if (!r) return false;
  return ipNum >= r.start && ipNum <= r.end;
}

function suggestSubnets(vnetPrefix) {
  var p = parseCIDR(vnetPrefix);
  if (!p) return { aksSubnet: '', servicesSubnet: '', peSubnet: '' };
  var mask = p.prefix === 0 ? 0 : (0xFFFFFFFF << (32 - p.prefix)) >>> 0;
  var base = (p.ip & mask) >>> 0;
  var aksStart = base;
  var aks = ((aksStart >>> 24) & 0xFF) + '.' + ((aksStart >>> 16) & 0xFF) + '.' + ((aksStart >>> 8) & 0xFF) + '.' + (aksStart & 0xFF) + '/20';
  var svcStart = (base + 16 * 256) >>> 0;
  var svc = ((svcStart >>> 24) & 0xFF) + '.' + ((svcStart >>> 16) & 0xFF) + '.' + ((svcStart >>> 8) & 0xFF) + '.' + (svcStart & 0xFF) + '/24';
  var peStart = (base + 17 * 256) >>> 0;
  var pe = ((peStart >>> 24) & 0xFF) + '.' + ((peStart >>> 16) & 0xFF) + '.' + ((peStart >>> 8) & 0xFF) + '.' + (peStart & 0xFF) + '/24';
  // Validate suggestions fit inside VNet
  if (!isWithinCIDR(aks, vnetPrefix) || !isWithinCIDR(svc, vnetPrefix) || !isWithinCIDR(pe, vnetPrefix)) {
    return { aksSubnet: '', servicesSubnet: '', peSubnet: '' };
  }
  return { aksSubnet: aks, servicesSubnet: svc, peSubnet: pe };
}

// ============================================================
// RENDER
// ============================================================

function render() {
  renderStepNav();
  renderCurrentStep();
  updateNavButtons();
}

function renderStepNav() {
  var nav = document.getElementById('stepNav');
  var html = '';
  for (var i = 0; i < STEPS.length; i++) {
    var s = STEPS[i];
    var v = validateStep(s.num);
    var active = s.num === currentStep;
    var dot = '';
    if (v.errors.length > 0) dot = '<span class="w-2 h-2 rounded-full bg-red-500 inline-block ml-2"></span>';
    else if (v.warnings.length > 0) dot = '<span class="w-2 h-2 rounded-full bg-yellow-400 inline-block ml-2"></span>';
    html += '<button onclick="goToStep(' + s.num + ')" class="w-full text-left px-3 py-2 rounded-lg mb-1 text-sm flex items-center justify-between ' +
      (active ? 'bg-blue-100 text-blue-800 font-semibold' : 'text-gray-600 hover:bg-gray-100') + '">' +
      '<span><span class="text-xs text-gray-400 mr-2">' + s.num + '.</span>' + s.title + '</span>' + dot + '</button>';
  }
  nav.innerHTML = html;
}

function renderCurrentStep() {
  var main = document.getElementById('mainContent');
  var html = '';
  switch (currentStep) {
    case 1: html = renderStep1(); break;
    case 2: html = renderStep2(); break;
    case 3: html = renderStep3(); break;
    case 4: html = renderStep4(); break;
    case 5: html = renderStep5(); break;
    case 6: html = renderStep6(); break;
    case 7: html = renderStep7(); break;
  }
  main.innerHTML = html;
}

function updateNavButtons() {
  var btnPrev = document.getElementById('btnPrev');
  var btnNext = document.getElementById('btnNext');
  btnPrev.disabled = currentStep === 1;
  if (currentStep === STEPS.length) {
    btnNext.textContent = 'Generate';
    btnNext.className = 'px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700';
  } else {
    btnNext.textContent = 'Next';
    btnNext.className = 'px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700';
  }
}

function nextStep() {
  var v = validateStep(currentStep);
  if (v.errors.length > 0) {
    render();
    return;
  }
  if (currentStep < STEPS.length) {
    currentStep++;
    render();
    window.scrollTo(0, 0);
  }
}

function prevStep() {
  if (currentStep > 1) {
    currentStep--;
    render();
    window.scrollTo(0, 0);
  }
}

function goToStep(n) {
  if (n >= 1 && n <= STEPS.length) {
    currentStep = n;
    render();
    window.scrollTo(0, 0);
  }
}

function badge(level) {
  var map = {
    params: 'bg-green-100 text-green-700',
    guide: 'bg-blue-100 text-blue-700',
    info: 'bg-gray-100 text-gray-600'
  };

  return '<span class="text-xs px-2 py-0.5 rounded-full font-medium ' + cls + '">' + level + '</span>';
}

function deployBadge(type) {
  var map = {
    'AKS add-on': 'bg-purple-100 text-purple-700',
    'Helm install': 'bg-orange-100 text-orange-700',
    'Advanced': 'bg-red-100 text-red-700'
  };
  var cls = map[type] || 'bg-gray-100 text-gray-600';
  return '<span class="text-xs px-2 py-0.5 rounded-full font-medium ' + cls + '">' + type + '</span>';
}

function fieldRow(label, inputHtml, badgeLevel, helpText) {
  var b = badgeLevel ? badge(badgeLevel) : '';
  var help = helpText ? '<p class="text-xs text-gray-500 mt-1">' + helpText + '</p>' : '';
  return '<div class="mb-4">' +
    '<label class="block text-sm font-medium text-gray-700 mb-1">' + label + ' ' + b + '</label>' +
    inputHtml + help + '</div>';
}

function errorsHtml(errors) {
  if (!errors.length) return '';
  var items = '';
  for (var i = 0; i < errors.length; i++) items += '<li>' + errors[i] + '</li>';
  return '<div class="mt-4 bg-red-50 border border-red-200 rounded-lg p-3">' +
    '<h4 class="text-sm font-semibold text-red-700 mb-1">Errors</h4>' +
    '<ul class="text-sm text-red-600 list-disc list-inside">' + items + '</ul></div>';
}

function warningsHtml(warnings) {
  if (!warnings.length) return '';
  var items = '';
  for (var i = 0; i < warnings.length; i++) items += '<li>' + warnings[i] + '</li>';
  return '<div class="mt-4 bg-yellow-50 border border-yellow-200 rounded-lg p-3">' +
    '<h4 class="text-sm font-semibold text-yellow-700 mb-1">Warnings</h4>' +
    '<ul class="text-sm text-yellow-600 list-disc list-inside">' + items + '</ul></div>';
}

function infoPanel(text) {
  return '<div class="bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm text-blue-700">' + text + '</div>';
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

        '<div><span class="text-gray-400">AKS:</span> ' + escapeHtml(aksPreview) + '</div>' +

    fieldRow('Environment',

        '<option value="acc"' + (env === 'acc' ? ' selected' : '') + '>acc</option>' +

    fieldRow('Region',

      'params', 'Azure region for all resources.') +

        '<label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="clusterAccess" value="true"' + (isPrivate ? ' checked' : '') + ' onchange="setVal(\'enablePrivateCluster\', true)"><span class="text-sm">Private</span></label>' +
      '</div><div class="mt-2">' + clusterImplication + '</div>',

// ============================================================
// PERSISTENCE
// ============================================================

var STORAGE_KEY = 'aksConfigurator_state';
var STORAGE_STEP_KEY = 'aksConfigurator_step';

function autoSave() {
  try {
    var data = {};
    var keys = Object.keys(state);
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      data[k] = { value: state[k].value, _edited: state[k]._edited };
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    localStorage.setItem(STORAGE_STEP_KEY, String(currentStep));
    var el = document.getElementById('saveStatus');
    if (el) {
      el.textContent = 'Auto-saved';
      el.className = 'text-xs text-gray-400 absolute right-4 bottom-1';
    }
  } catch (e) {
    var el = document.getElementById('saveStatus');
    if (el) {
      el.textContent = 'Save failed';
      el.className = 'text-xs text-red-400 absolute right-4 bottom-1';
    }
  }
}

function autoRestore() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    var data = JSON.parse(raw);
    if (!data || typeof data !== 'object' || !data.environment) return false;
    state = {};
    var keys = Object.keys(data);
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      var val = data[k].value;
      if (Array.isArray(val)) val = val.slice();
      else if (typeof val === 'object' && val !== null) val = Object.assign({}, val);
      state[k] = { value: val, _edited: !!data[k]._edited };
    }
    var savedStep = localStorage.getItem(STORAGE_STEP_KEY);
    if (savedStep) {
      var n = parseInt(savedStep, 10);
      if (n >= 1 && n <= STEPS.length) currentStep = n;
    }
    return true;
  } catch (e) {
    return false;
  }
}

function resetState() {
  if (!confirm('Reset all configuration to defaults? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_STEP_KEY);
  currentStep = 1;
  initState('dev');
  render();
}

function saveConfig() {
  var data = getFlatState();
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'aks-config-' + (getVal('customerName') || 'unnamed') + '-' + (getVal('environment') || 'dev') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function loadConfig() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        initState(data.environment || 'dev');
        var keys = Object.keys(data);
        for (var i = 0; i < keys.length; i++) {
          var k = keys[i];
          if (state[k] !== undefined) {
            state[k].value = data[k];
            state[k]._edited = true;
          }
        }
        autoSave();
        render();
      } catch (err) {
        alert('Failed to load configuration: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ============================================================
// INIT
// ============================================================

(function init() {
  if (!autoRestore()) {
    initState('dev');
  }
  render();
})();
