# PSRule for Azure configuration
# Loaded automatically by the microsoft/ps-rule@v2 action
# (default `source: .ps-rule/` relative to the repo root).

configuration:
  # Expand .bicep files into ARM so PSRule.Rules.Azure rules can evaluate them.
  AZURE_BICEP_FILE_EXPANSION: true
  # Expand .bicepparam files — this drives expansion from the entry point
  # (param file -> main.bicep -> modules) rather than evaluating each module
  # in isolation, which fails because modules have no parameter defaults.
  AZURE_BICEP_PARAMS_FILE_EXPANSION: true

input:
  # Skip standalone module files. Modules are only valid when invoked from
  # main.bicep with concrete parameters from a .bicepparam file. Scanning
  # them standalone produces spurious "parameter X was not set" errors.
  pathIgnore:
    - '**/modules/**/*.bicep'

# Suppressions for PSRule.Rules.Azure rules that predate the AKS
# 2025-10-01 schema. Each rule below is checking a legacy property shape
# that the configurator intentionally does not emit. The modern equivalent
# IS configured and satisfies the baseline intent — the rule simply does
# not inspect the newer properties.
suppression:
  Azure.AKS.NetworkPolicy:
    # Configurator emits networkDataplane: 'cilium' + networkPolicy: 'cilium'
    # with networkPluginMode: 'overlay'. Rule checks only the legacy value.
    - aks-citest-dev
    - aks-citest-acc
    - aks-citest-prod
  Azure.AKS.UseRBAC:
    # Configurator emits aadProfile.managed + enableAzureRBAC. Rule checks
    # the legacy aadProfile.enableRBAC flag that this schema no longer uses.
    - aks-citest-dev
    - aks-citest-acc
    - aks-citest-prod
  Azure.AKS.ContainerInsights:
    # Configurator emits azureMonitorProfile.containerInsights (AMA-based,
    # 2025-10-01 API). Rule checks only legacy addonProfiles.omsagent.
    - aks-citest-dev
    - aks-citest-acc
    - aks-citest-prod
  Azure.AKS.StandardLB:
    # outboundType: 'managedNATGateway' replaces loadBalancerSku entirely;
    # rule's check doesn't apply under the managed-NAT path.
    - aks-citest-dev
    - aks-citest-acc
    - aks-citest-prod
  Azure.AKS.PoolScaleSet:
    # agentPoolProfiles default to VirtualMachineScaleSets when type is
    # omitted (confirmed on 2025-10-01). Rule wants it stated explicitly.
    - aks-citest-dev
    - aks-citest-acc
    - aks-citest-prod
  Azure.AKS.AuditLogs:
    # diagnosticSettings uses categoryGroup: 'allLogs' (2021-05-01-preview
    # shortcut that includes kube-audit + kube-audit-admin). Rule enumerates
    # individual category names and doesn't recognise the group shortcut.
    - aks-citest-dev
    - aks-citest-acc
    - aks-citest-prod
  Azure.AKS.PlatformLogs:
    # Same categoryGroup: 'allLogs' reasoning as Azure.AKS.AuditLogs.
    - aks-citest-dev
    - aks-citest-acc
    - aks-citest-prod

  # Rules that genuinely apply but are environment-gated — dev runs lean;
  # acc/prod satisfy these rules via Bicep properties emitted conditionally
  # on environment.
  Azure.Log.Replication:
    # Workspace replication is enabled for acc/prod only.
    - log-citest-dev
  Azure.ACR.GeoReplica:
    # Cross-region replica is created only for Premium + acc/prod.
    # ACR fixture name uses uniqueString() so glob-match the dev prefix.
    - acrcitestdev*

  # Azure.VNET.PrivateSubnet — the AKS cluster uses outboundType:
  # 'managedNATGateway', which makes Azure auto-provision a NAT gateway in
  # the node resource group and attach it to the node subnet at deploy
  # time. PSRule evaluates the VNet resource statically and cannot see
  # the runtime attachment; the finding is a false negative under this
  # topology.
  Azure.VNET.PrivateSubnet:
    - vnet-citest-dev
    - vnet-citest-acc
    - vnet-citest-prod
